<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オリックス名鑑 Pro</title>
    <style>
        body { background-color: #000033; font-family: sans-serif; color: #b6a269; margin: 0; }
        .header-controls { 
            background: rgba(0,0,51,0.95); position: sticky; top: 0; z-index: 100; 
            border-bottom: 2px solid #b6a269; padding: 15px 10px; text-align: center;
        }
        .search-box {
            width: 85%; max-width: 300px; padding: 10px; border-radius: 20px;
            border: 1px solid #b6a269; background: #000044; color: #fff;
            margin-bottom: 12px; outline: none;
        }
        .filter-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; }
        .btn { 
            background: #b6a269; color: #000; border: none; padding: 6px 14px; 
            border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 12px;
        }
        .btn-outline { background: transparent; color: #b6a269; border: 1px solid #b6a269; }
        .btn.active { background: #fff; color: #000; border: 1px solid #fff; }

        .player-container { display: flex; flex-wrap: wrap; gap: 15px; padding: 20px; justify-content: center; }
        .player-card { 
            background-color: rgba(255, 255, 255, 0.08); border: 1px solid #b6a269; 
            padding: 15px; width: 175px; border-radius: 12px; text-align: center; 
            cursor: pointer; transition: transform 0.2s; position: relative;
        }
        .player-card:hover { transform: scale(1.03); background-color: rgba(182, 162, 105, 0.1); }

        .birthday-badge { 
            background: #ff69b4; color: #fff; font-size: 10px; padding: 2px 8px; 
            border-radius: 10px; position: absolute; top: -10px; left: 50%; 
            transform: translateX(-50%); font-weight: bold; white-space: nowrap;
        }

        .fav-star { position: absolute; top: 10px; right: 10px; font-size: 20px; color: #444; cursor: pointer; }
        .fav-star.active { color: #ffcc00; }
        .main-stats { background: rgba(182, 162, 105, 0.15); border-radius: 8px; padding: 8px; margin: 10px 0; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 8px; }
        .label { font-size: 10px; color: #b6a269; display: block; }
        .stats-val { font-size: 18px; color: #fff; font-weight: bold; }
        .sub-stats-val { font-size: 14px; color: #eee; font-weight: bold; }
        .name { font-size: 20px; margin: 5px 0; font-weight: bold; color: #fff; }
        .number-tag { font-size: 11px; background: #b6a269; color: #000; padding: 2px 6px; border-radius: 10px; font-weight: bold; }
        
        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9); justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content { background-color: #000044; border: 2px solid #b6a269; padding: 30px; border-radius: 15px; width: 85%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>
    <div class="header-controls">
        <input type="text" id="searchInput" class="search-box" placeholder="名前・背番号で検索..." oninput="filterData()">
        <div class="filter-group">
            <button class="btn active" id="btn-all" onclick="setFilter('all')">全員</button>
            <button class="btn btn-outline" id="btn-fav" onclick="setFilter('fav')">★推し</button>
            <button class="btn btn-outline" id="btn-p" onclick="setFilter('投手')">投手</button>
            <button class="btn btn-outline" id="btn-f" onclick="setFilter('野手')">野手</button>
        </div>
    </div>
    <div id="container" class="player-container"><p id="loading">読み込み中...</p></div>
    <div id="modal" onclick="closeModal()"><div class="modal-content" onclick="event.stopPropagation()"><div id="modal-detail"></div><button style="margin-top:20px; padding:10px 20px; background:#b6a269; border:none; font-weight:bold; border-radius:5px;" onclick="closeModal()">閉じる</button></div></div>

    <script>
        // デプロイしたGASのURLを入れてください
        const API_URL = 'あなたのGASウェブアプリURL';

        let allPlayers = [];
        let currentFilter = 'all';
        let favorites = JSON.parse(localStorage.getItem('orix_favs')) || [];

        function isTodayBirthday(birthdayStr) {
            if (!birthdayStr) return false;
            const today = new Date();
            const birthDate = new Date(birthdayStr);
            return today.getMonth() === birthDate.getMonth() && today.getDate() === birthDate.getDate();
        }

        async function loadStats() {
            try {
                const response = await fetch(API_URL);
                allPlayers = await response.json();
                allPlayers = allPlayers.filter(p => p["名前"]);
                filterData();
            } catch (e) { document.getElementById('loading').innerText = 'データ取得失敗'; }
        }

        function setFilter(type) {
            currentFilter = type;
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active', 'btn-outline'));
            document.querySelectorAll('.btn').forEach(b => b.classList.add('btn-outline'));
            const idMap = {'all':'btn-all', 'fav':'btn-fav', '投手':'btn-p', '野手':'btn-f'};
            document.getElementById(idMap[type]).classList.add('active');
            document.getElementById(idMap[type]).classList.remove('btn-outline');
            filterData();
        }

        function filterData() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allPlayers.filter(p => {
                const matchesSearch = String(p["名前"]).includes(searchText) || String(p["背番号"]).includes(searchText);
                let matchesFilter = true;
                if (currentFilter === 'fav') matchesFilter = favorites.includes(p["名前"]);
                else if (currentFilter === '投手' || currentFilter === '野手') matchesFilter = p["役割"] === currentFilter;
                return matchesSearch && matchesFilter;
            });
            renderCards(filtered);
        }

        function renderCards(data) {
            const container = document.getElementById('container');
            container.innerHTML = '';
            data.forEach(p => {
                const isP = p["役割"] === '投手';
                const isB = isTodayBirthday(p["生年月日"]);
                const card = document.createElement('div');
                card.className = 'player-card';
                card.onclick = () => showDetail(p);
                card.innerHTML = `
                    ${isB ? '<div class="birthday-badge">🎂 HAPPY BIRTHDAY!</div>' : ''}
                    <div class="fav-star ${favorites.includes(p["名前"])?'active':''}" onclick="event.stopPropagation(); toggleFav('${p["名前"]}')">★</div>
                    <span class="number-tag">#${p["背番号"]}</span>
                    <p style="margin:5px 0 0 0; font-size:10px; color:#ccc;">${p["軍構成"]} | ${p["ポジション"]}</p>
                    <p class="name">${p["名前"]}</p>
                    <div class="main-stats">
                        <div class="stats-grid" style="margin-top:0;">
                            <div><span class="label">${isP?'登板':'試合'}</span><span class="stats-val">${p["試合数/登板数"]}</span></div>
                            <div><span class="label">${isP?'防御':'打率'}</span><span class="stats-val">${p["打率/防御率"]}</span></div>
                        </div>
                    </div>`;
                container.appendChild(card);
            });
        }

        function toggleFav(name) {
            favorites.includes(name) ? favorites = favorites.filter(f => f !== name) : favorites.push(name);
            localStorage.setItem('orix_favs', JSON.stringify(favorites));
            filterData();
        }

        function showDetail(p) {
            const isP = p["役割"] === '投手';
            document.getElementById('modal-detail').innerHTML = `
                <h2 style="color:#fff;">${p["名前"]}</h2>
                <p>#${p["背番号"]} | ${p["軍構成"]}</p>
                <div style="display:grid; grid-template-columns:1fr 1fr; text-align:left; gap:10px;">
                    <p>${isP?'登板':'試合'}: ${p["試合数/登板数"]}</p><p>${isP?'防御':'打率'}: ${p["打率/防御率"]}</p>
                    <p>${isP?'勝利':'本塁'}: ${p["本塁打/勝利"]}</p><p>${isP?'敗戦':'打点'}: ${p["打点/敗戦"]}</p>
                </div>`;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        loadStats();
    </script>
</body>
</html>
