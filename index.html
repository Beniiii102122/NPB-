<!DOCTYPE html>
<html>
<head>
    <title>選手成績名鑑</title>
    <link href="https://unpkg.com/tabulator-tables/dist/css/tabulator.min.css" rel="stylesheet">
    <script src="https://unpkg.com/tabulator-tables/dist/js/tabulator.min.js"></script>
</head>
<body>
    <h1>2026年度 選手成績</h1>
    <div id="stats-table"></div>

    <script>
        // ここでCSVを読み込んで表にする処理を書く
        var table = new Tabulator("#stats-table", {
            ajaxURL: "data.csv", // あなたのCSVファイル
            layout: "fitColumns",
            columns: [
                {title: "背番号", field: "背番号"},
                {title: "名前", field: "名前"},
                {title: "打率", field: "打率/防御率"},
                // ...項目を並べる
            ],
        });
    </script>
</body>
</html>
