<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オリックス投手名鑑</title>
    <style>
        body { background-color: #000033; font-family: sans-serif; color: #b6a269; margin: 0; }
        .player-container { display: flex; flex-wrap: wrap; gap: 15px; padding: 20px; justify-content: center; }
        .player-card { 
            background-color: rgba(255, 255, 255, 0.1); 
            border: 1px solid #b6a269; 
            padding: 15px; width: 180px; border-radius: 8px; text-align: center; 
            cursor: pointer; transition: transform 0.2s;
        }
        .player-card:active { transform: scale(0.95); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        .label { font-size: 11px; color: #b6a269; }
        .stats { font-size: 18px; color: #fff; font-weight: bold; }
        .name { font-size: 20px; margin: 5px 0; font-weight: bold; }
        hr { border: 0; border-top: 1px solid #b6a269; }
        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9); justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background-color: #000044; border: 2px solid #b6a269; padding: 30px;
            border-radius: 15px; width: 80%; max-width: 400px; text-align: center;
        }
        .close-btn { margin-top: 20px; background-color: #b6a269; color: #000; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <h1 style="text-align: center; margin-top: 20px;">ORIX PITCHER STATS</h1>
    <div id="container" class="player-container">
        <p id="loading">データを読み込み中...</p>
    </div>

    <div id="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modal-detail"></div>
            <button class="close-btn" onclick="closeModal()">閉じる</button>
        </div>
    </div>

    <script>
        const SPREADSHEET_ID ='1dAaf-rsBz87908KYebqehlK4yG2lUrvCEZWDWVAnXUw';
        const TAB_NAME = '投手'; 
        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${TAB_NAME}`;

        async function loadStats() {
            try {
                const response = await fetch(url);
                const csvData = await response.text();
                const rows = csvData.split('\n').slice(1);
                const container = document.getElementById('container');
                container.innerHTML = '';

                rows.forEach(row => {
                    const cols = row.split(',').map(col => col.replace(/"/g, ''));
                    if (cols.length < 2) return;

                    const card = document.createElement('div');
                    card.className = 'player-card';
                    card.onclick = () => showDetail(cols);
                    
                    card.innerHTML = `
                        <p style="margin:0; font-size:12px;">背番号 ${cols[0]}</p>
                        <p class="name">${cols[1]}</p>
                        <hr>
                        <div class="stats-grid">
                            <div><span class="label">防御率</span><br><span class="stats">${cols[3]}</span></div>
                            <div><span class="label">奪三振</span><br><span class="stats">${cols[8] || '0'}</span></div>
                        </div>
                        <p style="font-size:10px; margin-top:10px;">タップで詳細を表示</p>`;
                    container.appendChild(card);
                });
            } catch (e) {
                document.getElementById('loading').innerText = '読み込み失敗。';
            }
        }

        function showDetail(data) {
            const modal = document.getElementById('modal');
            const detail = document.getElementById('modal-detail');
            detail.innerHTML = `
                <p style="color:#b6a269;">背番号 ${data[0]}</p>
                <h2 style="color:#fff; font-size:32px;">${data[1]}</h2>
                <p style="color:#FFD700; font-size:20px; font-weight:bold; margin-bottom:5px;">奪三振：${data[8] || '0'}</p>
                <p style="color:#ccc; font-size:14px; margin-top:0;">生年月日：${data[9] || '未入力'}</p>
                <hr>
                <div style="text-align:left; color:#fff; font-size:18px; line-height:1.8;">
                    <p>登板：${data[2]}</p>
                    <p>防御率：${data[3]}</p>
                    <p>勝利：${data[4]}</p>
                    <p>敗戦：${data[5]}</p>
                    <p>セーブ：${data[6]}</p>
                    <p>ホールド：${data[7]}</p>
                </div>
            `;
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
        loadStats();
    </script>
</body>
</html>
