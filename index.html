<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPB PLAYER STATS Pro</title>
    <style>
        /* オリックス：#000033 / ソフトバンク：#f5c700（黄色系）への切り替えも考慮 */
        body { background-color: #030303; font-family: sans-serif; color: #b6a269; margin: 0; }
        .nav-buttons { text-align: center; padding: 20px; background: #111; }
        .nav-btn { 
            padding: 10px 20px; margin: 5px; cursor: pointer; border: 2px solid #b6a269; 
            background: transparent; color: #b6a269; font-weight: bold; border-radius: 20px;
        }
        .nav-btn.active { background: #b6a269; color: #000; }
        
        .player-container { display: flex; flex-wrap: wrap; gap: 15px; padding: 20px; justify-content: center; }
        .player-card { 
            background-color: rgba(255, 255, 255, 0.05); 
            border: 1px solid #b6a269; 
            padding: 15px; width: 180px; border-radius: 8px; text-align: center; 
            transition: transform 0.2s;
        }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        .label { font-size: 11px; color: #b6a269; }
        .stats { font-size: 18px; color: #fff; font-weight: bold; }
        .name { font-size: 20px; margin: 5px 0; font-weight: bold; }
        hr { border: 0; border-top: 1px solid #b6a269; opacity: 0.3; }
        
        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9); justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background-color: #111; border: 2px solid #b6a269; padding: 30px;
            border-radius: 15px; width: 80%; max-width: 400px; text-align: center;
        }
    </style>
</head>
<body>

    <div class="nav-buttons">
        <button class="nav-btn active" onclick="changeTeam('ORIX', this)">ORIX</button>
        <button class="nav-btn" onclick="changeTeam('SOFTBANK', this)">SOFTBANK</button>
    </div>

    <h1 id="team-title" style="text-align: center;">ORIX PLAYER STATS</h1>
    
    <div id="container" class="player-container">
        <p id="loading">データを読み込み中...</p>
    </div>

    <div id="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modal-detail"></div>
            <button style="margin-top:20px; padding:10px 20px;" onclick="closeModal()">閉じる</button>
        </div>
    </div>

    <script>
        const CONFIG = {
            ORIX: {
                id: '1dAaf-rsBz87908KYebqehlK4yG2lUrvCEZWDWVAnXUw',
                tab: 'シート1',
                title: 'ORIX PLAYER STATS'
            },
            SOFTBANK: {
                id: 'ここにソフトバンクのスプレッドシートIDを入れてね',
                tab: 'シート1',
                title: 'SOFTBANK PLAYER STATS'
            }
        };

        async function loadStats(teamKey) {
            const container = document.getElementById('container');
            container.innerHTML = '<p>データを読み込み中...</p>';
            
            const info = CONFIG[teamKey];
            const url = `https://docs.google.com/spreadsheets/d/${info.id}/gviz/tq?tqx=out:csv&sheet=${info.tab}`;

            try {
                const response = await fetch(url);
                const csvData = await response.text();
                const rows = csvData.split('\n').slice(1);
                container.innerHTML = '';

                rows.forEach(row => {
                    const cols = row.split(',').map(col => col.replace(/"/g, ''));
                    if (cols.length < 2) return;

                    const card = document.createElement('div');
                    card.className = 'player-card';
                    card.onclick = () => showDetail(cols);
                    card.innerHTML = `
                        <p style="margin:0; font-size:12px;">背番号 ${cols[0]}</p>
                        <p class="name">${cols[1]}</p>
                        <hr>
                        <div class="stats-grid">
                            <div><span class="label">打率</span><br><span class="stats">${cols[3]}</span></div>
                            <div><span class="label">本塁打</span><br><span class="stats">${cols[4]}</span></div>
                        </div>`;
                    container.appendChild(card);
                });
            } catch (e) {
                container.innerHTML = '読み込み失敗。IDや共有設定を確認してね！';
            }
        }

        function changeTeam(teamKey, btn) {
            // ボタンのスタイル変更
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            // タイトル変更とデータ読み込み
            document.getElementById('team-title').innerText = CONFIG[teamKey].title;
            loadStats(teamKey);
        }

        function showDetail(data) {
            const modal = document.getElementById('modal');
            const detail = document.getElementById('modal-detail');
            detail.innerHTML = `
                <p>背番号 ${data[0]}</p>
                <h2 style="color:#fff; font-size:32px;">${data[1]}</h2>
                <div style="text-align:left; color:#fff; font-size:18px; line-height:2;">
                    <p>打率：${data[3]}</p><p>本塁打：${data[4]}</p><p>OPS：${data[7]}</p>
                </div>`;
            modal.style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        // 初期読み込み
        loadStats('ORIX');
    </script>
</body>
</html>
