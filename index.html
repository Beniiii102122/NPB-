<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPB名鑑 Pro</title>
    <style>
        :root {
            --team-bg: #000033;
            --team-accent: #b6a269;
            --team-modal: #000044;
        }

        body { background-color: var(--team-bg); font-family: 'Helvetica Neue', Arial, sans-serif; color: var(--team-accent); margin: 0; padding-bottom: 50px; transition: all 0.5s; }
        h1 { text-align: center; margin-top: 20px; letter-spacing: 2px; color: var(--team-accent); }
        
        .team-selector { display: flex; justify-content: center; background: rgba(0,0,0,0.4); padding: 10px 0; margin-bottom: 10px; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .team-tab { padding: 10px 15px; cursor: pointer; font-weight: bold; border-bottom: 3px solid transparent; opacity: 0.5; transition: 0.3s; color: #fff; font-size: 13px; }
        .team-tab.active { opacity: 1; border-bottom: 3px solid var(--team-accent); color: var(--team-accent); }

        .search-container { display: flex; justify-content: center; margin: 10px auto; width: 90%; max-width: 400px; }
        #player-search {
            width: 100%; padding: 12px 20px; border-radius: 25px; border: 1px solid var(--team-accent);
            background: rgba(255,255,255,0.1); color: #fff; font-size: 16px; outline: none;
        }

        .roster-selector { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; }
        .roster-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff;
            padding: 5px 15px; border-radius: 15px; cursor: pointer; font-size: 12px; transition: 0.3s;
        }
        .roster-btn.active { background: #fff; color: #000; border-color: #fff; }

        .sort-controls { display: flex; justify-content: center; gap: 8px; margin: 15px auto; flex-wrap: wrap; max-width: 95%; }
        .sort-btn {
            background-color: transparent; border: 1px solid var(--team-accent); color: var(--team-accent);
            padding: 8px 12px; border-radius: 20px; cursor: pointer; font-size: 12px; transition: all 0.3s;
        }
        .sort-btn.active { background-color: var(--team-accent); color: #000; }

        .player-container { display: flex; flex-wrap: wrap; gap: 15px; padding: 20px; justify-content: center; }
        .player-card { 
            background-color: rgba(255, 255, 255, 0.05); border: 1px solid var(--team-accent); 
            padding: 15px; width: 160px; border-radius: 12px; text-align: center; 
            cursor: pointer; transition: transform 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); position: relative;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        .label { font-size: 11px; color: var(--team-accent); font-weight: bold; }
        .stats { font-size: 19px; color: #fff; font-weight: bold; }
        .name { font-size: 17px; margin: 5px 0; font-weight: bold; color: #fff; height: 2.5em; display: flex; align-items: center; justify-content: center; }
        .number { font-size: 12px; color: var(--team-accent); }
        hr { border: 0; border-top: 1px solid var(--team-accent); opacity: 0.3; margin: 10px 0; }

        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.9); justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(5px); }
        .modal-content { background-color: var(--team-modal); border: 2px solid var(--team-accent); padding: 25px; border-radius: 20px; width: 85%; max-width: 380px; text-align: center; color: #fff; }
        .close-btn { margin-top: 20px; background-color: var(--team-accent); color: #000; border: none; padding: 10px 30px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .detail-item { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 8px 0; color: #fff; font-size: 14px; }
    </style>
</head>
<body>

    <div class="team-selector">
        <div id="tab-orix" class="team-tab active" onclick="switchTeam('ORIX')">ORIX</div>
        <div id="tab-softbank" class="team-tab" onclick="switchTeam('SOFTBANK')">SOFTBANK</div>
        <div id="tab-eagles" class="team-tab" onclick="switchTeam('EAGLES')">EAGLES</div>
        <div id="tab-marines" class="team-tab" onclick="switchTeam('MARINES')">MARINES</div>
        <div id="tab-fighters" class="team-tab" onclick="switchTeam('FIGHTERS')">FIGHTERS</div>
    </div>

    <h1 id="main-title">ORIX PLAYER STATS</h1>

    <div class="search-container">
        <input type="text" id="player-search" placeholder="選手名で検索..." oninput="handleSearch()">
    </div>

    <div class="roster-selector">
        <div class="roster-btn active" onclick="filterRoster('すべて', this)">すべて</div>
        <div class="roster-btn" onclick="filterRoster('一軍', this)">一軍</div>
        <div class="roster-btn" onclick="filterRoster('二軍', this)">二軍</div>
    </div>

    <div class="sort-controls">
        <button id="default-sort" class="sort-btn active" onclick="sortData('number', this)">背番号順</button>
        <button class="sort-btn" onclick="sortData('age', this)">年齢順</button>
        <button class="sort-btn" onclick="sortData('avg', this)">打率順</button>
        <button class="sort-btn" onclick="sortData('hr', this)">本塁打順</button>
        <button class="sort-btn" onclick="sortData('era', this)">防御率順</button>
        <button class="sort-btn" onclick="sortData('win', this)">勝利順</button>
    </div>
    
    <div id="container" class="player-container">
        <p id="loading">データを読み込み中...</p>
    </div>

    <div id="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modal-detail"></div>
            <button class="close-btn" onclick="closeModal()">閉じる</button>
        </div>
    </div>

    <script>
        const TEAMS = {
            ORIX: { id: '1dAaf-rsBz87908KYebqehlK4yG2lUrvCEZWDWVAnXUw', title: 'ORIX PLAYER STATS', bg: '#000033', accent: '#b6a269', modal: '#000044' },
            SOFTBANK: { id: '1D55MmUmSxxvDf92UE_N0N3BTSrZOoR5qQxoXm_BL2_E', title: 'SOFTBANK PLAYER STATS', bg: '#1a1a1a', accent: '#f5c700', modal: '#222222' },
            EAGLES: { id: '1o5tO7aFL2tA_eWfQCPuhyatXC4oqQUOYc1C49DuQ_sU', title: 'EAGLES PLAYER STATS', bg: '#870011', accent: '#EAAA00', modal: '#4c000a' },
            MARINES: { id: '1knxzRo7DNJO2FMXH09rhif4Shb06wEj80FF0whPoAuc', title: 'MARINES PLAYER STATS', bg: '#222222', accent: '#ffffff', modal: '#333333' },
            FIGHTERS: { id: '14Nd-iWKpiJg7M0Ou2NG0bgARZHJY-JIdARiWCwVTmjM', title: 'FIGHTERS PLAYER STATS', bg: '#005491', accent: '#f3c759', modal: '#003e6b' }
        };

        let currentTeam = 'ORIX';
        let allPlayers = []; 
        let currentSortMode = 'number';
        let searchQuery = "";
        let rosterFilter = "すべて";

        function calculateAge(birthdayStr) {
            if (!birthdayStr || birthdayStr === "0000/00/00") return "??";
            const birthDate = new Date(birthdayStr);
            const today = new Date();
            let age = today.getFullYear() - birthDate.getFullYear();
            const m = today.getMonth() - birthDate.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
                age--;
            }
            return age;
        }

        async function switchTeam(teamKey) {
            if (currentTeam === teamKey && allPlayers.length > 0) return;
            currentTeam = teamKey;
            const config = TEAMS[teamKey];
            
            document.querySelectorAll('.team-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${teamKey.toLowerCase()}`).classList.add('active');
            document.getElementById('main-title').innerText = config.title;
            
            document.documentElement.style.setProperty('--team-bg', config.bg);
            document.documentElement.style.setProperty('--team-accent', config.accent);
            document.documentElement.style.setProperty('--team-modal', config.modal);

            document.getElementById('player-search').value = "";
            searchQuery = "";
            rosterFilter = "すべて";
            document.querySelectorAll('.roster-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('.roster-btn').classList.add('active');

            document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('default-sort').classList.add('active');
            currentSortMode = 'number';

            await loadStats();
        }

        async function loadStats() {
            const container = document.getElementById('container');
            container.innerHTML = '<p>データを読み込み中...</p>';
            allPlayers = [];
            const config = TEAMS[currentTeam];
            const url = `https://docs.google.com/spreadsheets/d/${config.id}/gviz/tq?tqx=out:csv&sheet=シート1`;

            try {
                const response = await fetch(url);
                const csvData = await response.text();
                const rows = csvData.split(/\r?\n/).filter(row => row.trim() !== "").slice(1);
                allPlayers = rows.map(row => {
                    return row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g).map(c => c.replace(/^"|"$/g, ''));
                }).filter(cols => cols.length >= 15);
                applyFilterAndSort();
            } catch (e) {
                container.innerHTML = '読み込み失敗。共有設定を確認してください。';
            }
        }

        function handleSearch() {
            searchQuery = document.getElementById('player-search').value.toLowerCase();
            applyFilterAndSort();
        }

        function filterRoster(type, btn) {
            rosterFilter = type;
            document.querySelectorAll('.roster-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            applyFilterAndSort();
        }

        function sortData(key, btn) {
            currentSortMode = key;
            document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            applyFilterAndSort();
        }

        function applyFilterAndSort() {
            let displayList = [...allPlayers];

            if (searchQuery) {
                displayList = displayList.filter(p => p[1].includes(searchQuery));
            }

            if (rosterFilter !== "すべて") {
                displayList = displayList.filter(p => p[16] === rosterFilter);
            }

            if (currentSortMode === 'number') {
                displayList.sort((a, b) => (parseFloat(a[0]) || 0) - (parseFloat(b[0]) || 0));
            } else if (currentSortMode === 'age') {
                displayList.sort((a, b) => {
                    const dateA = a[17] || "9999/99/99";
                    const dateB = b[17] || "9999/99/99";
                    return dateA.localeCompare(dateB);
                });
            } else if (currentSortMode === 'avg') {
                displayList = displayList.filter(p => p[14] === '野手').sort((a, b) => (parseFloat(b[12]) || 0) - (parseFloat(a[12]) || 0));
            } else if (currentSortMode === 'hr') {
                displayList = displayList.filter(p => p[14] === '野手').sort((a, b) => (parseFloat(b[5]) || 0) - (parseFloat(a[5]) || 0));
            } else if (currentSortMode === 'era') {
                displayList = displayList.filter(p => p[14] === '投手').sort((a, b) => {
                    let eraA = parseFloat(a[12]);
                    let eraB = parseFloat(b[12]);
                    let gamesA = parseFloat(a[2]) || 0;
                    let gamesB = parseFloat(b[2]) || 0;
                    let scoreA = (gamesA > 0) ? eraA : 999;
                    let scoreB = (gamesB > 0) ? eraB : 999;
                    return scoreA - scoreB;
                });
            } else if (currentSortMode === 'win') {
                displayList = displayList.filter(p => p[14] === '投手').sort((a, b) => (parseFloat(b[3]) || 0) - (parseFloat(a[3]) || 0));
            }

            renderCards(displayList);
        }

        function renderCards(dataList) {
            const container = document.getElementById('container');
            container.innerHTML = '';
            
            if (dataList.length === 0) {
                container.innerHTML = '<p style="color:#888;">該当する選手はいません</p>';
                return;
            }

            dataList.forEach(cols => {
                const isPitcher = (cols[14] === '投手');
                const card = document.createElement('div');
                card.className = 'player-card';
                card.onclick = () => showDetail(cols);

                let label2 = isPitcher ? '防御率' : '打率';
                let value2 = cols[12];

                if (currentSortMode === 'hr') {
                    label2 = '本塁打';
                    value2 = cols[5];
                } else if (currentSortMode === 'win') {
                    label2 = '勝利';
                    value2 = cols[3];
                } else if (currentSortMode === 'age') {
                    label2 = '年齢';
                    value2 = calculateAge(cols[17]);
                }

                card.innerHTML = `
                    <div class="number">No. ${cols[0]}</div>
                    <div class="name">${cols[1]}</div>
                    <hr>
                    <div class="stats-grid">
                        <div><span class="label">${isPitcher ? '登板' : '試合'}</span><br><span class="stats">${cols[2]}</span></div>
                        <div><span class="label">${label2}</span><br><span class="stats">${value2}</span></div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function showDetail(data) {
            const modal = document.getElementById('modal');
            const detail = document.getElementById('modal-detail');
            const isPitcher = (data[14] === '投手');
            const age = calculateAge(data[17]);
            
            let statsHtml = isPitcher ? `
                <div class="detail-grid">
                    <div class="detail-item"><span>登板数</span><span>${data[2]}</span></div>
                    <div class="detail-item"><span>防御率</span><span>${data[12]}</span></div>
                    <div class="detail-item"><span>勝利</span><span>${data[3]}</span></div>
                    <div class="detail-item"><span>敗戦</span><span>${data[4]}</span></div>
                    <div class="detail-item"><span>ホールド</span><span>${data[5]}</span></div>
                    <div class="detail-item"><span>セーブ</span><span>${data[6]}</span></div>
                    <div class="detail-item"><span>奪三振</span><span>${data[9]}</span></div>
                    <div class="detail-item"><span>WHIP</span><span>${data[13]}</span></div>
                </div>
            ` : `
                <div class="detail-grid">
                    <div class="detail-item"><span>試合数</span><span>${data[2]}</span></div>
                    <div class="detail-item"><span>打率</span><span>${data[12]}</span></div>
                    <div class="detail-item"><span>本塁打</span><span>${data[5]}</span></div>
                    <div class="detail-item"><span>打点</span><span>${data[6]}</span></div>
                    <div class="detail-item"><span>盗塁</span><span>${data[9]}</span></div>
                    <div class="detail-item"><span>OPS</span><span>${data[13]}</span></div>
                </div>
            `;

            detail.innerHTML = `
                <div class="number">背番号 ${data[0]}</div>
                <h2 style="color:#fff; font-size:28px; margin: 10px 0;">${data[1]}</h2>
                <p style="color:var(--team-accent); font-size:14px;">${data[15]} | ${data[16]}</p>
                ${statsHtml}
                <p style="color:#ccc; font-size:13px; margin-top:15px;">生年月日: ${data[17]} (${age}歳)</p>
            `;
            modal.style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        loadStats();
    </script>
</body>
</html>
