　<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPB名鑑 Pro</title>
    <style>
        :root {
            --team-bg: #1a1a1a;
            --team-accent: #f5c700;
            --team-modal: #222222;
        }

        body { background-color: var(--team-bg); font-family: 'Helvetica Neue', Arial, sans-serif; color: var(--team-accent); margin: 0; padding-bottom: 50px; transition: all 0.5s; }
        h1 { text-align: center; margin-top: 20px; margin-bottom: 10px; letter-spacing: 2px; color: var(--team-accent); }

        .team-selector { display: flex; justify-content: center; background: rgba(0,0,0,0.4); padding: 10px 0; margin-bottom: 10px; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); flex-wrap: wrap; }
        .team-tab { padding: 10px 15px; cursor: pointer; font-weight: bold; border-bottom: 3px solid transparent; opacity: 0.5; transition: 0.3s; color: #fff; font-size: 12px; }
        .team-tab.active { opacity: 1; border-bottom: 3px solid var(--team-accent); color: var(--team-accent); }

        .search-container { display: flex; justify-content: center; margin: 10px auto; width: 95%; max-width: 500px; gap: 8px; flex-wrap: wrap; }
        #player-search {
            flex: 1; min-width: 150px; padding: 10px 15px; border-radius: 20px; border: 1px solid var(--team-accent);
            background: rgba(255,255,255,0.1); color: #fff; font-size: 14px; outline: none;
        }

        #sort-select {
            padding: 8px 10px; border-radius: 20px; border: 1px solid var(--team-accent);
            background: var(--team-bg); color: var(--team-accent); font-size: 13px; font-weight: bold; cursor: pointer; outline: none;
        }

        .order-btn {
            padding: 8px 15px; border-radius: 20px; border: 1px solid var(--team-accent);
            background: rgba(255,255,255,0.1); color: var(--team-accent); font-size: 13px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .order-btn.active { background: var(--team-accent); color: #000; }

        .filter-section { display: flex; flex-direction: column; align-items: center; gap: 8px; margin-bottom: 15px; }
        .filter-group { display: flex; justify-content: center; gap: 5px; flex-wrap: wrap; }
        .filter-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff;
            padding: 5px 12px; border-radius: 12px; cursor: pointer; font-size: 11px; transition: 0.3s;
        }
        .filter-btn.active { background: var(--team-accent); color: #000; border-color: var(--team-accent); font-weight: bold; }

        .player-container { display: flex; flex-wrap: wrap; gap: 12px; padding: 15px; justify-content: center; }
        .player-card { 
            background-color: rgba(255, 255, 255, 0.05); border: 1px solid var(--team-accent); 
            padding: 15px; width: 145px; border-radius: 12px; text-align: center; 
            cursor: pointer; transition: transform 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        .label { font-size: 10px; color: var(--team-accent); font-weight: bold; }
        .stats { font-size: 18px; color: #fff; font-weight: bold; }
        .name { font-size: 15px; margin: 5px 0; font-weight: bold; color: #fff; height: 2.5em; display: flex; align-items: center; justify-content: center; }
        .number { font-size: 11px; color: var(--team-accent); }
        hr { border: 0; border-top: 1px solid var(--team-accent); opacity: 0.3; margin: 10px 0; }

        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.9); justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(8px); }
        .modal-content { background-color: var(--team-modal); border: 2px solid var(--team-accent); padding: 30px 20px; border-radius: 24px; width: 85%; max-width: 380px; text-align: center; color: #fff; }
        
        .modal-header { margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .modal-num { font-size: 14px; color: var(--team-accent); font-weight: bold; }
        .modal-name { font-size: 30px; font-weight: bold; margin: 5px 0; }
        .modal-sub { font-size: 13px; opacity: 0.7; }

        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .detail-item { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 12px; }
        .detail-label { font-size: 10px; color: var(--team-accent); font-weight: bold; margin-bottom: 4px; }
        .detail-value { font-size: 20px; font-weight: bold; }

        .modal-footer { font-size: 12px; color: #aaa; margin-top: 15px; }
        .close-btn { margin-top: 20px; background-color: var(--team-accent); color: #000; border: none; padding: 10px 40px; border-radius: 25px; font-weight: bold; cursor: pointer; }

        .footer-note { text-align: center; font-size: 10px; color: var(--team-accent); opacity: 0.7; margin: 30px auto; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); width: 90%; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="team-selector">
        <div id="tab-softbank" class="team-tab active" onclick="switchTeam('SOFTBANK')">ソフトバンク</div>
        <div id="tab-fighters" class="team-tab" onclick="switchTeam('FIGHTERS')">日本ハム</div>
        <div id="tab-orix" class="team-tab" onclick="switchTeam('ORIX')">オリックス</div>
        <div id="tab-eagles" class="team-tab" onclick="switchTeam('EAGLES')">楽天</div>
        <div id="tab-lions" class="team-tab" onclick="switchTeam('LIONS')">西武</div>
        <div id="tab-marines" class="team-tab" onclick="switchTeam('MARINES')">ロッテ</div>
    </div>

    <h1 id="main-title">福岡ソフトバンクホークス</h1>

    <div class="search-container">
        <input type="text" id="player-search" placeholder="選手名検索..." oninput="handleSearch()">
        <select id="sort-select" onchange="handleSort(this.value)">
            <option value="number">背番号</option>
            <option value="age">年齢</option>
        </select>
        <button id="order-toggle" class="order-btn" onclick="toggleOrder()">昇順</button>
    </div>

    <div class="filter-section">
        <div class="filter-group">
            <div class="filter-btn active" onclick="setFilter('roster', 'すべて', this)">すべて</div>
            <div class="filter-btn" onclick="setFilter('roster', '一軍', this)">一軍</div>
            <div class="filter-btn" onclick="setFilter('roster', '二軍', this)">二軍</div>
        </div>
        <div class="filter-group">
            <div class="filter-btn active" onclick="setFilter('pos', 'すべて', this)">全ポジ</div>
            <div class="filter-btn" onclick="setFilter('pos', '先発', this)">先発</div>
            <div class="filter-btn" onclick="setFilter('pos', 'リリーフ', this)">リリーフ</div>
            <div class="filter-btn" onclick="setFilter('pos', '捕手', this)">捕手</div>
            <div class="filter-btn" onclick="setFilter('pos', '内野手', this)">内野手</div>
            <div class="filter-btn" onclick="setFilter('pos', '外野手', this)">外野手</div>
        </div>
    </div>
    
    <div id="container" class="player-container">
        <p>データを読み込み中...</p>
    </div>

    <div class="footer-note">
        ※ポジション判定ロジックを更新しました。
    </div>

    <div id="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modal-detail"></div>
            <button class="close-btn" onclick="closeModal()">閉じる</button>
        </div>
    </div>

    <script>
        const TEAMS = {
            SOFTBANK: { id: '1D55MmUmSxxvDf92UE_N0N3BTSrZOoR5qQxoXm_BL2_E', title: '福岡ソフトバンクホークス', bg: '#1a1a1a', accent: '#f5c700', modal: '#222222' },
            FIGHTERS: { id: '14Nd-iWKpiJg7M0Ou2NG0bgARZHJY-JIdARiWCwVTmjM', title: '北海道日本ハムファイターズ', bg: '#005491', accent: '#f3c759', modal: '#003e6b' },
            ORIX: { id: '1dAaf-rsBz87908KYebqehlK4yG2lUrvCEZWDWVAnXUw', title: 'オリックス・バファローズ', bg: '#000033', accent: '#b6a269', modal: '#000044' },
            EAGLES: { id: '1o5tO7aFL2tA_eWfQCPuhyatXC4oqQUOYc1C49DuQ_sU', title: '東北楽天ゴールデンイーグルス', bg: '#870011', accent: '#EAAA00', modal: '#4c000a' },
            LIONS: { id: '1rU0KqHiGXvS3hAMp0snqepykftW4gnoEcqNAFcK9ZJw', title: '埼玉西武ライオンズ', bg: '#03192e', accent: '#ffffff', modal: '#0a2a47' },
            MARINES: { id: '1knxzRo7DNJO2FMXH09rhif4Shb06wEj80FF0whPoAuc', title: '千葉ロッテマリーンズ', bg: '#222222', accent: '#ffffff', modal: '#333333' }
        };

        let allPlayers = []; 
        let currentTeam = 'SOFTBANK';
        let currentSortMode = 'number';
        let isAscending = true; 
        let searchQuery = "";
        let rosterFilter = "すべて";
        let posFilter = "すべて";

        function calculateAge(birthdayStr) {
            if (!birthdayStr || birthdayStr === "0000/00/00") return "??";
            const birthDate = new Date(birthdayStr);
            const today = new Date();
            let age = today.getFullYear() - birthDate.getFullYear();
            if (today.getMonth() < birthDate.getMonth() || (today.getMonth() === birthDate.getMonth() && today.getDate() < birthDate.getDate())) age--;
            return age;
        }

        async function switchTeam(teamKey) {
            currentTeam = teamKey;
            const config = TEAMS[teamKey];
            document.querySelectorAll('.team-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${teamKey.toLowerCase()}`).classList.add('active');
            document.getElementById('main-title').innerText = config.title;
            document.documentElement.style.setProperty('--team-bg', config.bg);
            document.documentElement.style.setProperty('--team-accent', config.accent);
            document.documentElement.style.setProperty('--team-modal', config.modal);
            
            document.getElementById('player-search').value = "";
            document.getElementById('sort-select').value = "number";
            isAscending = true;
            document.getElementById('order-toggle').innerText = "昇順";
            searchQuery = ""; currentSortMode = "number"; rosterFilter = "すべて"; posFilter = "すべて";
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.filter-group').forEach(g => g.firstElementChild.classList.add('active'));
            
            await loadStats();
        }

        async function loadStats() {
            const container = document.getElementById('container');
            container.innerHTML = '<p>読み込み中...</p>';
            const url = `https://docs.google.com/spreadsheets/d/${TEAMS[currentTeam].id}/gviz/tq?tqx=out:csv&sheet=シート1`;
            try {
                const response = await fetch(url);
                const csvData = await response.text();
                const rows = csvData.split(/\r?\n/).filter(row => row.trim() !== "").slice(1);
                allPlayers = rows.map(row => {
                    return row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g).map(c => c.replace(/^"|"$/g, ''));
                }).filter(cols => cols.length >= 15);
                applyFilterAndSort();
            } catch (e) {
                container.innerHTML = '失敗。';
            }
        }

        function handleSearch() { searchQuery = document.getElementById('player-search').value.toLowerCase(); applyFilterAndSort(); }
        function handleSort(val) { currentSortMode = val; applyFilterAndSort(); }
        
        function toggleOrder() {
            isAscending = !isAscending;
            document.getElementById('order-toggle').innerText = isAscending ? "昇順" : "降順";
            applyFilterAndSort();
        }

        function setFilter(type, value, btn) {
            if (type === 'roster') rosterFilter = value;
            if (type === 'pos') posFilter = value;
            btn.parentElement.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            applyFilterAndSort();
        }

        function applyFilterAndSort() {
            let list = [...allPlayers];
            
            if (searchQuery) list = list.filter(p => p[1].includes(searchQuery));
            if (rosterFilter !== "すべて") list = list.filter(p => p[16] === rosterFilter);
            
            // フィルタロジックの修正
            if (posFilter !== "すべて") {
                // ポジション（16列目＝インデックス15）で直接判定
                // スプレッドシートの「先発」「リリーフ」「捕手」「内野手」「外野手」がここに入る
                list = list.filter(p => p[15] === posFilter);
            }
            
            list.sort((a, b) => {
                let valA, valB;
                if (currentSortMode === 'number') { valA = parseFloat(a[0]) || 0; valB = parseFloat(b[0]) || 0; }
                else if (currentSortMode === 'age') { valA = a[17] || "9999/99/99"; valB = b[17] || "9999/99/99"; }
                
                if (valA < valB) return isAscending ? -1 : 1;
                if (valA > valB) return isAscending ? 1 : -1;
                return 0;
            });
            
            renderCards(list);
        }

        function renderCards(dataList) {
            const container = document.getElementById('container');
            container.innerHTML = dataList.length === 0 ? '<p style="color:#888;">該当なし</p>' : '';
            dataList.forEach(cols => {
                // 15列目(インデックス14)が「投手」かどうかで表示切り替え
                const isP = (cols[14] === '投手');
                const card = document.createElement('div');
                card.className = 'player-card';
                card.onclick = () => showDetail(cols);
                card.innerHTML = `
                    <div class="number">No. ${cols[0]}</div>
                    <div class="name">${cols[1]}</div>
                    <hr>
                    <div class="stats-grid">
                        <div><span class="label">${isP ? '登板' : '試合'}</span><br><span class="stats">${cols[2]}</span></div>
                        <div><span class="label">${isP ? '防御率' : '打率'}</span><br><span class="stats">${cols[12]}</span></div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function showDetail(data) {
            const modal = document.getElementById('modal');
            const detail = document.getElementById('modal-detail');
            const isP = (data[14] === '投手');
            const stats = isP ? [
                {l: '登板', v: data[2]}, {l: '防御率', v: data[12]},
                {l: '勝利', v: data[3]}, {l: '敗戦', v: data[4]},
                {l: 'ホールド', v: data[5]}, {l: 'セーブ', v: data[6]},
                {l: '奪三振', v: data[9]}, {l: 'WHIP', v: data[13]}
            ] : [
                {l: '試合', v: data[2]}, {l: '打率', v: data[12]},
                {l: '本塁打', v: data[5]}, {l: '打点', v: data[6]},
                {l: '盗塁', v: data[9]}, {l: 'OPS', v: data[13]}
            ];
            detail.innerHTML = `
                <div class="modal-header">
                    <div class="modal-num">背番号 ${data[0]}</div>
                    <div class="modal-name">${data[1]}</div>
                    <div class="modal-sub">${data[15]} | ${data[16]}</div>
                </div>
                <div class="detail-grid">${stats.map(s => `<div class="detail-item"><div class="detail-label">${s.l}</div><div class="detail-value">${s.v}</div></div>`).join('')}</div>
                <div class="modal-footer">${data[17]} (${calculateAge(data[17])}歳)</div>
            `;
            modal.style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        switchTeam('SOFTBANK');
    </script>
</body>
</html>
