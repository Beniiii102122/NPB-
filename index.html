<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPB名鑑 Pro</title>
    <style>
        :root {
            --team-bg: #1a1a1a;
            --team-accent: #f5c700;
            --team-modal: #222222;
        }

        body { background-color: var(--team-bg); font-family: 'Helvetica Neue', Arial, sans-serif; color: var(--team-accent); margin: 0; padding-bottom: 50px; transition: all 0.5s; }
        h1 { text-align: center; margin-top: 20px; margin-bottom: 20px; letter-spacing: 2px; color: var(--team-accent); }

        .team-selector { display: flex; justify-content: center; background: rgba(0,0,0,0.4); padding: 10px 0; margin-bottom: 10px; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); flex-wrap: wrap; }
        .team-tab { padding: 10px 15px; cursor: pointer; font-weight: bold; border-bottom: 3px solid transparent; opacity: 0.5; transition: 0.3s; color: #fff; font-size: 12px; }
        .team-tab.active { opacity: 1; border-bottom: 3px solid var(--team-accent); color: var(--team-accent); }

        .search-container { display: flex; justify-content: center; margin: 10px auto; width: 90%; max-width: 400px; }
        #player-search {
            width: 100%; padding: 12px 20px; border-radius: 25px; border: 1px solid var(--team-accent);
            background: rgba(255,255,255,0.1); color: #fff; font-size: 16px; outline: none;
        }

        .roster-selector { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; }
        .roster-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff;
            padding: 5px 15px; border-radius: 15px; cursor: pointer; font-size: 12px; transition: 0.3s;
        }
        .roster-btn.active { background: #fff; color: #000; border-color: #fff; }

        .sort-controls { display: flex; justify-content: center; gap: 8px; margin: 15px auto; flex-wrap: wrap; max-width: 95%; }
        .sort-btn {
            background-color: transparent; border: 1px solid var(--team-accent); color: var(--team-accent);
            padding: 8px 12px; border-radius: 20px; cursor: pointer; font-size: 12px; transition: all 0.3s;
        }
        .sort-btn.active { background-color: var(--team-accent); color: #000; }

        .player-container { display: flex; flex-wrap: wrap; gap: 15px; padding: 20px; justify-content: center; }
        .player-card { 
            background-color: rgba(255, 255, 255, 0.05); border: 1px solid var(--team-accent); 
            padding: 15px; width: 160px; border-radius: 12px; text-align: center; 
            cursor: pointer; transition: transform 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); position: relative;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        .label { font-size: 11px; color: var(--team-accent); font-weight: bold; }
        .stats { font-size: 19px; color: #fff; font-weight: bold; }
        .name { font-size: 17px; margin: 5px 0; font-weight: bold; color: #fff; height: 2.5em; display: flex; align-items: center; justify-content: center; }
        .number { font-size: 12px; color: var(--team-accent); }
        hr { border: 0; border-top: 1px solid var(--team-accent); opacity: 0.3; margin: 10px 0; }

        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.9); justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(8px); }
        .modal-content { background-color: var(--team-modal); border: 2px solid var(--team-accent); padding: 30px 20px; border-radius: 24px; width: 88%; max-width: 400px; text-align: center; color: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .modal-header { margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .modal-num { font-size: 14px; color: var(--team-accent); font-weight: bold; margin-bottom: 4px; }
        .modal-name { font-size: 32px; font-weight: bold; margin: 0; color: #fff; }
        .modal-sub { font-size: 14px; opacity: 0.7; margin-top: 5px; }

        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .detail-item { 
            background: rgba(255,255,255,0.05); border-radius: 12px; padding: 12px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .detail-label { font-size: 10px; color: var(--team-accent); font-weight: bold; margin-bottom: 4px; text-transform: uppercase; }
        .detail-value { font-size: 22px; font-weight: bold; color: #fff; }

        .modal-footer { font-size: 12px; color: #aaa; margin-top: 15px; }
        .close-btn { margin-top: 25px; background-color: var(--team-accent); color: #000; border: none; padding: 12px 50px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }

        .footer-note {
            text-align: center; font-size: 10px; color: var(--team-accent); opacity: 0.8;
            margin: 40px auto 20px; padding: 15px 20px; line-height: 1.6; max-width: 90%;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div class="team-selector">
        <div id="tab-softbank" class="team-tab active" onclick="switchTeam('SOFTBANK')">福岡ソフトバンクホークス</div>
        <div id="tab-fighters" class="team-tab" onclick="switchTeam('FIGHTERS')">北海道日本ハムファイターズ</div>
        <div id="tab-orix" class="team-tab" onclick="switchTeam('ORIX')">オリックス・バファローズ</div>
        <div id="tab-eagles" class="team-tab" onclick="switchTeam('EAGLES')">東北楽天ゴールデンイーグルス</div>
        <div id="tab-lions" class="team-tab" onclick="switchTeam('LIONS')">埼玉西武ライオンズ</div>
        <div id="tab-marines" class="team-tab" onclick="switchTeam('MARINES')">千葉ロッテマリーンズ</div>
    </div>

    <h1 id="main-title">福岡ソフトバンクホークス</h1>

    <div class="search-container">
        <input type="text" id="player-search" placeholder="選手名で検索..." oninput="handleSearch()">
    </div>

    <div class="roster-selector">
        <div class="roster-btn active" onclick="filterRoster('すべて', this)">すべて</div>
        <div class="roster-btn" onclick="filterRoster('一軍', this)">一軍</div>
        <div class="roster-btn" onclick="filterRoster('二軍', this)">二軍</div>
    </div>

    <div class="sort-controls">
        <button id="default-sort" class="sort-btn active" onclick="sortData('number', this)">背番号順</button>
        <button class="sort-btn" onclick="sortData('age', this)">年齢順</button>
        <button class="sort-btn" onclick="sortData('avg', this)">打率順</button>
        <button class="sort-btn" onclick="sortData('hr', this)">本塁打順</button>
        <button class="sort-btn" onclick="sortData('era', this)">防御率順</button>
        <button class="sort-btn" onclick="sortData('win', this)">勝利順</button>
    </div>
    
    <div id="container" class="player-container">
        <p id="loading">データを読み込み中...</p>
    </div>

    <div class="footer-note">
        ※投手の先発かリリーフかは作成主の主観が入ってるのでご了承ください。<br>
        ※成績データは公式記録と異なる場合があります。
    </div>

    <div id="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modal-detail"></div>
            <button class="close-btn" onclick="closeModal()">閉じる</button>
        </div>
    </div>

    <script>
        const TEAMS = {
            SOFTBANK: { id: '1D55MmUmSxxvDf92UE_N0N3BTSrZOoR5qQxoXm_BL2_E', title: '福岡ソフトバンクホークス', bg: '#1a1a1a', accent: '#f5c700', modal: '#222222' },
            FIGHTERS: { id: '14Nd-iWKpiJg7M0Ou2NG0bgARZHJY-JIdARiWCwVTmjM', title: '北海道日本ハムファイターズ', bg: '#005491', accent: '#f3c759', modal: '#003e6b' },
            ORIX: { id: '1dAaf-rsBz87908KYebqehlK4yG2lUrvCEZWDWVAnXUw', title: 'オリックス・バファローズ', bg: '#000033', accent: '#b6a269', modal: '#000044' },
            EAGLES: { id: '1o5tO7aFL2tA_eWfQCPuhyatXC4oqQUOYc1C49DuQ_sU', title: '東北楽天ゴールデンイーグルス', bg: '#870011', accent: '#EAAA00', modal: '#4c000a' },
            LIONS: { id: '1rU0KqHiGXvS3hAMp0snqepykftW4gnoEcqNAFcK9ZJw', title: '埼玉西武ライオンズ', bg: '#03192e', accent: '#ffffff', modal: '#0a2a47' },
            MARINES: { id: '1knxzRo7DNJO2FMXH09rhif4Shb06wEj80FF0whPoAuc', title: '千葉ロッテマリーンズ', bg: '#222222', accent: '#ffffff', modal: '#333333' }
        };

        let currentTeam = 'SOFTBANK';
        let allPlayers = []; 
        let currentSortMode = 'number';
        let searchQuery = "";
        let rosterFilter = "すべて";

        function calculateAge(birthdayStr) {
            if (!birthdayStr || birthdayStr === "0000/00/00") return "??";
            const birthDate = new Date(birthdayStr);
            const today = new Date();
            let age = today.getFullYear() - birthDate.getFullYear();
            const m = today.getMonth() - birthDate.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) age--;
            return age;
        }

        async function switchTeam(teamKey) {
            currentTeam = teamKey;
            const config = TEAMS[teamKey];
            document.querySelectorAll('.team-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${teamKey.toLowerCase()}`).classList.add('active');
            document.getElementById('main-title').innerText = config.title;
            document.documentElement.style.setProperty('--team-bg', config.bg);
            document.documentElement.style.setProperty('--team-accent', config.accent);
            document.documentElement.style.setProperty('--team-modal', config.modal);
            document.getElementById('player-search').value = "";
            searchQuery = ""; rosterFilter = "すべて";
            await loadStats();
        }

        async function loadStats() {
            const container = document.getElementById('container');
            container.innerHTML = '<p>データを読み込み中...</p>';
            allPlayers = [];
            const config = TEAMS[currentTeam];
            const url = `https://docs.google.com/spreadsheets/d/${config.id}/gviz/tq?tqx=out:csv&sheet=シート1`;
            try {
                const response = await fetch(url);
                const csvData = await response.text();
                const rows = csvData.split(/\r?\n/).filter(row => row.trim() !== "").slice(1);
                allPlayers = rows.map(row => {
                    return row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g).map(c => c.replace(/^"|"$/g, ''));
                }).filter(cols => cols.length >= 15);
                applyFilterAndSort();
            } catch (e) {
                container.innerHTML = '読み込み失敗。';
            }
        }

        function handleSearch() { searchQuery = document.getElementById('player-search').value.toLowerCase(); applyFilterAndSort(); }
        function filterRoster(type, btn) { rosterFilter = type; document.querySelectorAll('.roster-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); applyFilterAndSort(); }
        function sortData(key, btn) { currentSortMode = key; document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); applyFilterAndSort(); }

        function applyFilterAndSort() {
            let displayList = [...allPlayers];
            if (searchQuery) displayList = displayList.filter(p => p[1].includes(searchQuery));
            if (rosterFilter !== "すべて") displayList = displayList.filter(p => p[16] === rosterFilter);
            if (currentSortMode === 'number') displayList.sort((a, b) => (parseFloat(a[0]) || 0) - (parseFloat(b[0]) || 0));
            else if (currentSortMode === 'age') displayList.sort((a, b) => (a[17] || "9999/99/99").localeCompare(b[17] || "9999/99/99"));
            else if (currentSortMode === 'avg') displayList = displayList.filter(p => p[14] === '野手').sort((a, b) => (parseFloat(b[12]) || 0) - (parseFloat(a[12]) || 0));
            else if (currentSortMode === 'hr') displayList = displayList.filter(p => p[14] === '野手').sort((a, b) => (parseFloat(b[5]) || 0) - (parseFloat(a[5]) || 0));
            else if (currentSortMode === 'era') displayList = displayList.filter(p => p[14] === '投手').sort((a, b) => (parseFloat(a[12]) || 999) - (parseFloat(b[12]) || 999));
            else if (currentSortMode === 'win') displayList = displayList.filter(p => p[14] === '投手').sort((a, b) => (parseFloat(b[3]) || 0) - (parseFloat(a[3]) || 0));
            renderCards(displayList);
        }

        function renderCards(dataList) {
            const container = document.getElementById('container');
            container.innerHTML = '';
            dataList.forEach(cols => {
                const isPitcher = (cols[14] === '投手');
                const card = document.createElement('div');
                card.className = 'player-card';
                card.onclick = () => showDetail(cols);
                let label2 = isPitcher ? '防御率' : '打率';
                let value2 = cols[12];
                card.innerHTML = `
                    <div class="number">No. ${cols[0]}</div>
                    <div class="name">${cols[1]}</div>
                    <hr>
                    <div class="stats-grid">
                        <div><span class="label">${isPitcher ? '登板' : '試合'}</span><br><span class="stats">${cols[2]}</span></div>
                        <div><span class="label">${label2}</span><br><span class="stats">${value2}</span></div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function showDetail(data) {
            const modal = document.getElementById('modal');
            const detail = document.getElementById('modal-detail');
            const isPitcher = (data[14] === '投手');
            
            const stats = isPitcher ? [
                {l: '登板', v: data[2]}, {l: '防御率', v: data[12]},
                {l: '勝利', v: data[3]}, {l: '敗戦', v: data[4]},
                {l: 'ホールド', v: data[5]}, {l: 'セーブ', v: data[6]},
                {l: '奪三振', v: data[9]}, {l: 'WHIP', v: data[13]}
            ] : [
                {l: '試合', v: data[2]}, {l: '打率', v: data[12]},
                {l: '本塁打', v: data[5]}, {l: '打点', v: data[6]},
                {l: '盗塁', v: data[9]}, {l: 'OPS', v: data[13]}
            ];

            let gridHtml = stats.map(s => `<div class="detail-item"><span class="detail-label">${s.l}</span><span class="detail-value">${s.v}</span></div>`).join('');

            detail.innerHTML = `
                <div class="modal-header">
                    <div class="modal-num">背番号 ${data[0]}</div>
                    <h2 class="modal-name">${data[1]}</h2>
                    <div class="modal-sub">${data[15]} | ${data[16]}</div>
                </div>
                <div class="detail-grid">${gridHtml}</div>
                <div class="modal-footer">生年月日: ${data[17]} (${calculateAge(data[17])}歳)</div>
            `;
            modal.style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        switchTeam('SOFTBANK');
    </script>
</body>
</html>
