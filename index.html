<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オリックス名鑑 Pro</title>
    <style>
        body { background-color: #000033; font-family: sans-serif; color: #b6a269; margin: 0; }
        .player-container { display: flex; flex-wrap: wrap; gap: 15px; padding: 20px; justify-content: center; }
        .player-card { 
            background-color: rgba(255, 255, 255, 0.1); 
            border: 1px solid #b6a269; 
            padding: 15px; 
            width: 180px; 
            border-radius: 8px; 
            text-align: center; 
            cursor: pointer;
            transition: transform 0.2s;
        }
        .player-card:active { transform: scale(0.95); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        .label { font-size: 11px; color: #b6a269; }
        .stats { font-size: 18px; color: #fff; font-weight: bold; }
        .name { font-size: 20px; margin: 5px 0; font-weight: bold; }
        .pos { font-size: 12px; color: #ccc; margin-bottom: 5px; }
        hr { border: 0; border-top: 1px solid #b6a269; }
        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            justify-content: center; align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background-color: #000044;
            border: 2px solid #b6a269;
            padding: 30px;
            border-radius: 15px;
            width: 80%;
            max-width: 400px;
            text-align: center;
        }
        .close-btn {
            margin-top: 20px;
            background-color: #b6a269;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center; margin-top: 20px;">ORIX PLAYER STATS</h1>
    
    <div id="container" class="player-container">
        <p id="loading">データを読み込み中...</p>
    </div>

    <div id="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modal-detail"></div>
            <button class="close-btn" onclick="closeModal()">閉じる</button>
        </div>
    </div>

    <script>
        // スプレッドシートの設定
        const SPREADSHEET_ID = '1dAaf-rsBz87908KYebqehlK4yG2lUrvCEZWDWVAnXUw';
        const TAB_NAME = 'シート1'; 
        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${TAB_NAME}`;

        async function loadStats() {
            try {
                const response = await fetch(url);
                const csvData = await response.text();
                // 1行目（ヘッダー）を飛ばして処理
                const rows = csvData.split('\n').slice(1);
                const container = document.getElementById('container');
                container.innerHTML = '';

                rows.forEach(row => {
                    // CSVのカンマ区切りを配列にする
                    const cols = row.split(',').map(col => col.replace(/"/g, '').trim());
                    if (cols.length < 2) return;

                    // データの割り当て（スプレッドシートの列順）
                    const number = cols[0]; // 背番号
                    const name = cols[1];   // 名前
                    const avgOrEra = cols[3]; // 打率/防御率
                    const hrOrWin = cols[4];  // 本塁打/勝利
                    const pos = cols[13];    // ポジション
                    const group = cols[14];  // 軍構成

                    const card = document.createElement('div');
                    card.className = 'player-card';
                    card.onclick = () => showDetail(cols);
                    
                    card.innerHTML = `
                        <p style="margin:0; font-size:12px;">${group} | 背番号 ${number}</p>
                        <p class="name">${name}</p>
                        <p class="pos">${pos}</p>
                        <hr>
                        <div class="stats-grid">
                            <div><span class="label">打率/防御</span><br><span class="stats">${avgOrEra}</span></div>
                            <div><span class="label">本塁打/勝</span><br><span class="stats">${hrOrWin}</span></div>
                        </div>
                        <p style="font-size:10px; margin-top:10px;">タップで詳細を表示</p>`;
                    container.appendChild(card);
                });
            } catch (e) {
                document.getElementById('loading').innerText = '読み込み失敗。スプレッドシートの「ウェブに公開」を確認してね！';
            }
        }

        function showDetail(data) {
            const modal = document.getElementById('modal');
            const detail = document.getElementById('modal-detail');
            detail.innerHTML = `
                <p style="color:#b6a269;">${data[14]} | 背番号 ${data[0]}</p>
                <h2 style="color:#fff; font-size:32px; margin-bottom:0;">${data[1]}</h2>
                <p style="color:#ccc; font-size:14px;">${data[13]}（${data[15]}生）</p>
                <hr>
                <div style="text-align:left; color:#fff; font-size:18px; line-height:1.8;">
                    <p>試合/登板：${data[2]}</p>
                    <p>打率/防御率：${data[3]}</p>
                    <p>本塁打/勝利：${data[4]}</p>
                    <p>打点/敗戦：${data[5]}</p>
                    <p>安打/奪三振：${data[6]}</p>
                    <p>OPS/WHIP：${data[8]}</p>
                </div>
            `;
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        loadStats();
    </script>
</body>
</html>
