<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPB 選手名鑑 Pro - Premium</title>
    <style>
        :root {
            --team-bg: #121212;
            --team-accent: #f5c700;
            --team-sub: #333333;
            --team-grad: linear-gradient(135deg, #1a1a1a 0%, #000000 100%);
            --sidebar-width: 260px;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body { 
            background-color: var(--team-bg); 
            background-image: var(--team-grad);
            background-attachment: fixed;
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; 
            color: #ffffff; 
            margin: 0; 
            padding-bottom: 50px; 
            transition: all 0.5s ease;
            line-height: 1.6;
        }

        /* --- 初回チーム選択用オーバーレイ --- */
        #welcome-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 3000;
            display: none; justify-content: center; align-items: center;
            backdrop-filter: blur(20px);
        }
        .welcome-content {
            width: 90%; max-width: 500px; text-align: center;
        }
        .team-grid-welcome {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 30px;
        }
        .welcome-team-btn {
            padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05); color: #fff; cursor: pointer; transition: 0.3s;
            font-weight: bold; font-size: 14px;
        }
        .welcome-team-btn:hover { background: rgba(255,255,255,0.2); border-color: #fff; }

        /* --- 固定ヘッダー --- */
        .sticky-header {
            position: sticky; top: 0; z-index: 900;
            background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px); padding-bottom: 15px;
            border-bottom: 1px solid var(--glass-border);
        }

        /* --- サイドバー --- */
        .sidebar {
            height: 100%; width: 0; position: fixed; z-index: 1001; top: 0; left: 0;
            background-color: rgba(0, 0, 0, 0.95); overflow-x: hidden; transition: 0.4s;
            padding-top: 80px; border-right: 1px solid var(--team-accent);
        }
        .sidebar a, .sidebar .menu-item {
            padding: 18px 30px; text-decoration: none; font-size: 15px; color: #aaa;
            display: block; transition: 0.3s; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05);
            letter-spacing: 1px;
        }
        .sidebar a:hover, .sidebar .menu-item:hover { color: var(--team-accent); background: rgba(255,255,255,0.05); }
        .sidebar .closebtn { position: absolute; top: 20px; right: 25px; font-size: 30px; color: var(--team-accent); }
        .dropdown-container { display: none; background: rgba(255,255,255,0.02); }
        .dropdown-container div { padding: 12px 12px 12px 50px; font-size: 13px; color: #888; cursor: pointer; }

        .openbtn {
            font-size: 22px; cursor: pointer; background: var(--glass); color: white;
            padding: 12px 18px; border: none; position: fixed; top: 15px; left: 15px;
            z-index: 1000; border-radius: 12px; border: 1px solid var(--glass-border);
            backdrop-filter: blur(5px); transition: 0.3s;
        }

        /* --- メインコンテンツ --- */
        .header-container { text-align: center; padding: 70px 0 15px 0; }
        .main-title { font-size: 24px; margin: 0; letter-spacing: 4px; color: #fff; font-weight: 800; text-transform: uppercase; }
        .sub-title { font-size: 11px; margin: 5px 0 0 0; color: var(--team-accent); letter-spacing: 2px; font-weight: bold; }
        #team-name-display { font-size: 20px; margin: 12px 0; font-weight: 700; color: #fff; }

        .filter-area { display: flex; flex-direction: column; align-items: center; gap: 10px; margin: 0 auto; width: 92%; max-width: 550px; }
        .search-container { display: flex; width: 100%; }
        #player-search { 
            flex: 1; padding: 14px 20px; border-radius: 14px; border: 1px solid var(--glass-border); 
            background: rgba(255,255,255,0.05); color: #fff; outline: none; font-size: 15px;
        }

        .select-container { display: flex; width: 100%; gap: 8px; }
        .filter-select, .fav-filter-btn { 
            padding: 12px; border-radius: 12px; border: 1px solid var(--glass-border); 
            background: rgba(255,255,255,0.05); color: #fff; font-size: 12px; cursor: pointer; flex: 1;
        }
        .fav-filter-btn { max-width: 60px; }
        .fav-filter-btn.active { background: var(--team-accent); color: #000; font-weight: bold; }

        /* --- 選手カード --- */
        .player-container { display: flex; flex-wrap: wrap; gap: 16px; padding: 30px 20px; justify-content: center; }
        .player-card { 
            background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
            border: 1px solid var(--glass-border); padding: 20px 15px; width: 155px; border-radius: 20px; 
            text-align: center; cursor: pointer; position: relative; transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .player-card:hover { transform: translateY(-8px); border-color: var(--team-accent); background: rgba(255,255,255,0.1); }
        .fav-btn { position: absolute; top: 12px; right: 12px; font-size: 18px; color: rgba(255,255,255,0.2); }
        .fav-btn.active { color: var(--team-accent); }
        .pos-badge { display: inline-block; padding: 3px 10px; border-radius: 8px; background: rgba(255,255,255,0.1); color: var(--team-accent); font-size: 10px; font-weight: 800; margin-bottom: 8px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 12px; }
        .label { font-size: 9px; color: #888; font-weight: bold; }
        .stats { font-size: 20px; color: #fff; font-weight: 700; }
        .name { font-size: 16px; margin: 8px 0; font-weight: 700; color: #fff; height: 2.4em; display: flex; align-items: center; justify-content: center; }

        /* --- モーダル --- */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(10px); }
        .modal-content { background: #1a1a1a; border: 1px solid var(--team-accent); padding: 40px 25px; border-radius: 30px; width: 88%; max-width: 400px; text-align: center; }
        .close-btn { background: var(--team-accent); color: #000; border: none; padding: 14px 50px; border-radius: 15px; font-weight: 800; cursor: pointer; margin-top: 25px; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="welcome-overlay">
        <div class="welcome-content">
            <h1 style="letter-spacing: 4px;">CHOOSE YOUR TEAM</h1>
            <p style="color: #888; font-size: 13px;">お気に入りチームを選択してください。<br>次回からこのチームが最初に表示されます。</p>
            <div class="team-grid-welcome" id="welcome-grid"></div>
        </div>
    </div>

    <button class="openbtn" onclick="openNav()">☰</button>

    <div id="mySidebar" class="sidebar">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">×</a>
        <a onclick="resetFavTeam()" style="color:var(--team-accent); font-weight:bold;">初期表示チームを変更</a>
        <div class="menu-item" onclick="toggleDropdown('pa-league')">PACIFIC LEAGUE ▼</div>
        <div id="pa-league" class="dropdown-container"></div>
        <div class="menu-item" onclick="toggleDropdown('ce-league')">CENTRAL LEAGUE ▼</div>
        <div id="ce-league" class="dropdown-container"></div>
        <a href="https://forms.gle/PZdrWHx4sJ3gfjh19" target="_blank">Contact</a>
    </div>

    <div id="main">
        <div class="sticky-header">
            <div class="header-container">
                <div class="main-title">NPB Player Directory</div>
                <div id="team-name-display">LOADING...</div>
            </div>
            <div class="filter-area">
                <input type="text" id="player-search" placeholder="Search Player Name..." oninput="applyFilters()">
                <div class="select-container">
                    <button id="fav-toggle" class="fav-filter-btn" onclick="toggleFavFilter()">★</button>
                    <select id="filter-pos" class="filter-select" onchange="applyFilters()">
                        <option value="">POSITION: ALL</option>
                        <option value="先発">先発</option>
                        <option value="リリーフ">リリーフ</option>
                        <option value="捕手">捕手</option>
                        <option value="内野手">内野手</option>
                        <option value="外野手">外野手</option>
                    </select>
                </div>
            </div>
        </div>
        <div id="loader" style="display:none; text-align:center; padding:100px;"><div style="width:40px; height:40px; border:3px solid rgba(255,255,255,0.1); border-top-color:var(--team-accent); border-radius:50%; animation:spin 1s linear infinite; margin:0 auto;"></div></div>
        <div id="container" class="player-container"></div>
    </div>

    <div id="modal" onclick="closeModal()"><div class="modal-content" onclick="event.stopPropagation()"><div id="modal-detail"></div><button class="close-btn" onclick="closeModal()">CLOSE</button></div></div>

    <script>
        const TEAMS = {
            SOFTBANK: { id: '1D55MmUmSxxvDf92UE_N0N3BTSrZOoR5qQxoXm_BL2_E', name: 'ソフトバンク', title: 'SoftBank Hawks', bg: '#121212', accent: '#f5c700', grad: 'linear-gradient(135deg, #222 0%, #000 100%)', league: 'pa' },
            FIGHTERS: { id: '14Nd-iWKpiJg7M0Ou2NG0bgARZHJY-JIdARiWCwVTmjM', name: '日本ハム', title: 'Nippon-Ham Fighters', bg: '#003e6b', accent: '#f3c759', grad: 'linear-gradient(135deg, #005491 0%, #001a33 100%)', league: 'pa' },
            ORIX: { id: '1dAaf-rsBz87908KYebqehlK4yG2lUrvCEZWDWVAnXUw', name: 'オリックス', title: 'Orix Buffaloes', bg: '#000022', accent: '#b6a269', grad: 'linear-gradient(135deg, #000033 0%, #000011 100%)', league: 'pa' },
            EAGLES: { id: '1o5tO7aFL2tA_eWfQCPuhyatXC4oqQUOYc1C49DuQ_sU', name: '楽天', title: 'Rakuten Eagles', bg: '#4c000a', accent: '#EAAA00', grad: 'linear-gradient(135deg, #870011 0%, #300000 100%)', league: 'pa' },
            LIONS: { id: '1rU0KqHiGXvS3hAMp0snepykftW4gnoEcqNAFcK9ZJw', name: '西武', title: 'Seibu Lions', bg: '#03192e', accent: '#ffffff', grad: 'linear-gradient(135deg, #0a2a47 0%, #00050a 100%)', league: 'pa' },
            MARINES: { id: '1knxzRo7DNJO2FMXH09rhif4Shb06wEj80FF0whPoAuc', name: 'ロッテ', title: 'Lotte Marines', bg: '#111', accent: '#ffffff', grad: 'linear-gradient(135deg, #333 0%, #000 100%)', league: 'pa' },
            HANSHIN: { id: '1hZwkTDSa4AOUSlvFvgYB74hU78Uk6Tb3Wxdr6wKuPhs', name: '阪神', title: 'Hanshin Tigers', bg: '#000', accent: '#ffe200', grad: 'linear-gradient(135deg, #333 0%, #000 100%)', league: 'ce' },
            BAYSTARS: { id: '1EGfKQS7CPBxnqk7MN6MVoFc1naTvplPwMMlvO6ucXrs', name: 'DeNA', title: 'DeNA BayStars', bg: '#003e6b', accent: '#ffffff', grad: 'linear-gradient(135deg, #005596 0%, #002540 100%)', league: 'ce' },
            GIANTS: { id: '11fiRAjQKNG2widh8Hs9X5izk76CsBhkxC5GucEu3Gio', name: '巨人', title: 'Yomiuri Giants', bg: '#1a1a1a', accent: '#ff6600', grad: 'linear-gradient(135deg, #333 0%, #000 100%)', league: 'ce' },
            DRAGONS: { id: '1jgeiLHIvsXpg-Lb-NS9EwQtsciqqusxMYqUZNDVt5MA', name: '中日', title: 'Chunichi Dragons', bg: '#002d61', accent: '#ffffff', grad: 'linear-gradient(135deg, #004a9e 0%, #001a33 100%)', league: 'ce' },
            CARP: { id: '1xp_n78P5IMw63fD9dtDF9tQhK9zgF5otK9fwLNPOW2s', name: '広島', title: 'Hiroshima Carp', bg: '#800000', accent: '#ffffff', grad: 'linear-gradient(135deg, #ff0000 0%, #500000 100%)', league: 'ce' },
            SWALLOWS: { id: '1BYL-hAJNaSshpWfDYnYsk9GdUIT9nEEIGejLuFV4BxY', name: 'ヤクルト', title: 'Yakult Swallows', bg: '#001a33', accent: '#97c24a', grad: 'linear-gradient(135deg, #002d56 0%, #000d1a 100%)', league: 'ce' }
        };

        let allPlayers = [];
        let favorites = JSON.parse(localStorage.getItem('npb_favs')) || [];
        let showOnlyFavs = false;

        // サイドバーと初期画面の構築
        function initApp() {
            const paContainer = document.getElementById('pa-league');
            const ceContainer = document.getElementById('ce-league');
            const welcomeGrid = document.getElementById('welcome-grid');

            Object.keys(TEAMS).forEach(key => {
                const t = TEAMS[key];
                const div = document.createElement('div');
                div.innerText = t.name;
                div.onclick = () => switchTeam(key);
                if(t.league === 'pa') paContainer.appendChild(div); else ceContainer.appendChild(div);

                const btn = document.createElement('button');
                btn.className = 'welcome-team-btn';
                btn.innerText = t.name;
                btn.onclick = () => {
                    localStorage.setItem('npb_default_team', key);
                    document.getElementById('welcome-overlay').style.display = 'none';
                    switchTeam(key);
                };
                welcomeGrid.appendChild(btn);
            });

            const savedTeam = localStorage.getItem('npb_default_team');
            if (savedTeam && TEAMS[savedTeam]) {
                switchTeam(savedTeam);
            } else {
                document.getElementById('welcome-overlay').style.display = 'flex';
            }
        }

        async function switchTeam(teamKey) {
            const config = TEAMS[teamKey];
            closeNav();
            document.getElementById('team-name-display').innerText = config.title.toUpperCase();
            document.documentElement.style.setProperty('--team-bg', config.bg);
            document.documentElement.style.setProperty('--team-accent', config.accent);
            document.documentElement.style.setProperty('--team-grad', config.grad);
            await loadStats(config.id);
        }

        function resetFavTeam() {
            localStorage.removeItem('npb_default_team');
            location.reload();
        }

        async function loadStats(sheetId) {
            const container = document.getElementById('container');
            const loader = document.getElementById('loader');
            container.innerHTML = ''; loader.style.display = 'block';
            const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=シート1`;
            try {
                const response = await fetch(url);
                const csvData = await response.text();
                const rows = csvData.split(/\r?\n/).filter(row => row.trim() !== "").slice(1);
                allPlayers = rows.map(row => row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g).map(c => c.replace(/^"|"$/g, '')));
                loader.style.display = 'none'; renderCards(allPlayers);
            } catch (e) { loader.style.display = 'none'; container.innerHTML = 'DATA LOAD ERROR'; }
        }

        function openNav() { document.getElementById("mySidebar").style.width = "var(--sidebar-width)"; }
        function closeNav() { document.getElementById("mySidebar").style.width = "0"; }
        function toggleDropdown(id) { const d = document.getElementById(id); d.style.display = d.style.display === "block" ? "none" : "block"; }
        function toggleFavFilter() { showOnlyFavs = !showOnlyFavs; document.getElementById('fav-toggle').classList.toggle('active', showOnlyFavs); applyFilters(); }

        function applyFilters() {
            const q = document.getElementById('player-search').value.toLowerCase();
            const pos = document.getElementById('filter-pos').value;
            const filtered = allPlayers.filter(p => {
                const matchP = pos === "" || (pos === "リリーフ" ? (p[15].includes("中継") || p[15].includes("抑")) : p[15].includes(pos));
                return p[1].includes(q) && matchP && (!showOnlyFavs || favorites.includes(p[1]));
            });
            renderCards(filtered);
        }

        function renderCards(data) {
            const c = document.getElementById('container'); c.innerHTML = '';
            data.forEach(cols => {
                const isP = cols[14] === '投手';
                const card = document.createElement('div');
                card.className = 'player-card';
                card.onclick = () => showDetail(cols);
                card.innerHTML = `<div class="fav-btn ${favorites.includes(cols[1]) ? 'active' : ''}">★</div><div class="pos-badge">${cols[15]}</div><div class="name">${cols[1]}</div><div class="stats-grid"><div><div class="label">${isP?'ERA':'AVG'}</div><div class="stats">${cols[12]}</div></div><div><div class="label">${isP?'G':'HR'}</div><div class="stats">${isP?cols[2]:cols[5]}</div></div></div>`;
                c.appendChild(card);
            });
        }

        function showDetail(d) {
            const isP = d[14] === '投手';
            let s = isP ? [{l:'G',v:d[2]},{l:'ERA',v:d[12]},{l:'W',v:d[3]},{l:'L',v:d[4]},{l:'HLD',v:d[5]},{l:'SV',v:d[6]}] : [{l:'G',v:d[2]},{l:'AVG',v:d[12]},{l:'HR',v:d[5]},{l:'RBI',v:d[6]},{l:'SB',v:d[9]},{l:'OPS',v:d[13]}];
            document.getElementById('modal-detail').innerHTML = `<div style="margin-bottom:20px;"><div style="color:var(--team-accent);font-weight:800;"># ${d[0]} | ${d[15]}</div><div style="font-size:32px;font-weight:800;">${d[1]}</div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">${s.map(x=>`<div style="background:rgba(255,255,255,0.03);padding:10px;border-radius:10px;"><div style="font-size:10px;color:#666;">${x.l}</div><div style="font-size:20px;color:var(--team-accent);">${x.v}</div></div>`).join('')}</div>`;
            document.getElementById('modal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        initApp();
    </script>
</body>
</html>
