<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オリックス名鑑 Pro</title>
    <style>
        body { background-color: #000033; font-family: 'Helvetica Neue', Arial, sans-serif; color: #b6a269; margin: 0; }
        h1 { text-align: center; margin-top: 20px; letter-spacing: 2px; }
        
        .player-container { display: flex; flex-wrap: wrap; gap: 15px; padding: 20px; justify-content: center; }
        
        .player-card { 
            background-color: rgba(255, 255, 255, 0.05); 
            border: 1px solid #b6a269; 
            padding: 15px; 
            width: 170px; 
            border-radius: 12px; 
            text-align: center; 
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .player-card:active { transform: scale(0.95); }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        .label { font-size: 11px; color: #b6a269; font-weight: bold; }
        .stats { font-size: 19px; color: #fff; font-weight: bold; }
        .name { font-size: 18px; margin: 5px 0; font-weight: bold; color: #fff; }
        .number { font-size: 12px; color: #b6a269; }
        hr { border: 0; border-top: 1px solid #b6a269; opacity: 0.3; margin: 10px 0; }

        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            justify-content: center; align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background-color: #000044;
            border: 2px solid #b6a269;
            padding: 25px;
            border-radius: 20px;
            width: 85%;
            max-width: 350px;
            text-align: center;
        }
        .close-btn {
            margin-top: 20px;
            background-color: #b6a269;
            color: #000;
            border: none;
            padding: 10px 30px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
        }
        .detail-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(182, 162, 105, 0.2);
            padding: 8px 0;
            color: #fff;
        }
    </style>
</head>
<body>
    <h1>ORIX PLAYER STATS</h1>
    
    <div id="container" class="player-container">
        <p id="loading">データを読み込み中...</p>
    </div>

    <div id="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modal-detail"></div>
            <button class="close-btn" onclick="closeModal()">閉じる</button>
        </div>
    </div>

    <script>
        const SPREADSHEET_ID = '1dAaf-rsBz87908KYebqehlK4yG2lUrvCEZWDWVAnXUw';
        const TAB_NAME = 'シート1'; 
        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${TAB_NAME}`;

        async function loadStats() {
            try {
                const response = await fetch(url);
                const csvData = await response.text();
                const rows = csvData.split(/\r?\n/).filter(row => row.trim() !== "").slice(1);
                const container = document.getElementById('container');
                container.innerHTML = '';

                rows.forEach(row => {
                    const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g).map(c => c.replace(/^"|"$/g, ''));
                    if (cols.length < 15) return;

                    const role = cols[14]; // 投手 or 野手
                    const isPitcher = (role === '投手');
                    
                    const card = document.createElement('div');
                    card.className = 'player-card';
                    card.onclick = () => showDetail(cols);
                    
                    // カード内の表示内容を投手/野手で分岐
                    card.innerHTML = `
                        <div class="number">No. ${cols[0]}</div>
                        <div class="name">${cols[1]}</div>
                        <hr>
                        <div class="stats-grid">
                            <div>
                                <span class="label">${isPitcher ? '登板' : '試合'}</span><br>
                                <span class="stats">${cols[2]}</span>
                            </div>
                            <div>
                                <span class="label">${isPitcher ? '防御率' : '打率'}</span><br>
                                <span class="stats">${cols[12]}</span>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                document.getElementById('loading').innerText = 'データの取得に失敗しました。';
            }
        }

        function showDetail(data) {
            const modal = document.getElementById('modal');
            const detail = document.getElementById('modal-detail');
            const isPitcher = (data[14] === '投手');
            
            detail.innerHTML = `
                <div class="number">背番号 ${data[0]}</div>
                <h2 style="color:#fff; font-size:28px; margin: 10px 0;">${data[1]}</h2>
                <p style="color:#b6a269; font-size:14px; margin-bottom:15px;">${data[15]} | ${data[16]}</p>
                
                <div style="text-align:left; margin-top:10px;">
                    <div class="detail-item"><span>${isPitcher ? '登板数' : '試合数'}</span><span>${data[2]}</span></div>
                    <div class="detail-item"><span>${isPitcher ? '防御率' : '打率'}</span><span>${data[12]}</span></div>
                    <div class="detail-item"><span>${isPitcher ? '勝利' : '安打'}</span><span>${isPitcher ? data[3] : data[4]}</span></div>
                    <div class="detail-item"><span>${isPitcher ? '奪三振' : '本塁打'}</span><span>${isPitcher ? data[9] : data[5]}</span></div>
                    <div class="detail-item"><span>${isPitcher ? 'WHIP' : 'OPS'}</span><span>${data[13]}</span></div>
                    <div class="detail-item"><span>生年月日</span><span>${data[17]}</span></div>
                </div>
            `;
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        loadStats();
    </script>
</body>
</html>
