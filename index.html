<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オリックス名鑑 Pro</title>
    <style>
        body { background-color: #000033; font-family: sans-serif; color: #b6a269; margin: 0; }
        .player-container { display: flex; flex-wrap: wrap; gap: 15px; padding: 20px; justify-content: center; }
        .player-card { 
            background-color: rgba(255, 255, 255, 0.1); 
            border: 1px solid #b6a269; 
            padding: 15px; 
            width: 180px; 
            border-radius: 8px; 
            text-align: center; 
            cursor: pointer;
            transition: transform 0.2s;
        }
        .player-card:hover { background-color: rgba(255, 255, 255, 0.2); }
        .player-card:active { transform: scale(0.95); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        .label { font-size: 11px; color: #b6a269; }
        .stats { font-size: 18px; color: #fff; font-weight: bold; }
        .name { font-size: 20px; margin: 5px 0; font-weight: bold; }
        hr { border: 0; border-top: 1px solid #b6a269; }
        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            justify-content: center; align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background-color: #000044;
            border: 2px solid #b6a269;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 450px;
            text-align: center;
        }
        .close-btn {
            margin-top: 20px;
            background-color: #b6a269;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center; margin-top: 20px;">ORIX PLAYER STATS</h1>
    
    <div id="container" class="player-container">
        <p id="loading">データを読み込み中...</p>
    </div>

    <div id="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modal-detail"></div>
            <button class="close-btn" onclick="closeModal()">閉じる</button>
        </div>
    </div>

    <script>
        const SPREADSHEET_ID ='1dAaf-rsBz87908KYebqehlK4yG2lUrvCEZWDWVAnXUw';
        const TAB_NAME = 'シート1'; 
        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${TAB_NAME}`;

        async function loadStats() {
            try {
                const response = await fetch(url);
                const csvData = await response.text();
                const rows = csvData.split('\n').filter(row => row.trim() !== '').slice(1);
                const container = document.getElementById('container');
                container.innerHTML = '';

                rows.forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(col => col.replace(/"/g, '').trim());
                    if (cols.length < 15) return;

                    const isPitcher = cols[14] === '投手'; // O列
                    const rateLabel = isPitcher ? '防御率' : '打率';
                    const opsLabel = isPitcher ? 'WHIP' : 'OPS';

                    const card = document.createElement('div');
                    card.className = 'player-card';
                    card.onclick = () => showDetail(cols);
                    
                    card.innerHTML = `
                        <p style="margin:0; font-size:12px; color:#aaa;">背番号 ${cols[0]} | ${cols[16]}</p>
                        <p class="name">${cols[1]}</p>
                        <hr>
                        <div class="stats-grid">
                            <div><span class="label">${rateLabel}</span><br><span class="stats">${cols[12]}</span></div>
                            <div><span class="label">${opsLabel}</span><br><span class="stats">${cols[13]}</span></div>
                        </div>
                        <p style="font-size:10px; margin-top:10px; color:#b6a269;">${cols[15]}</p>`;
                    container.appendChild(card);
                });
            } catch (e) {
                document.getElementById('loading').innerText = '読み込み失敗。共有設定を確認してください。';
            }
        }

        function showDetail(data) {
            const modal = document.getElementById('modal');
            const detail = document.getElementById('modal-detail');
            const isPitcher = data[14] === '投手';

            detail.innerHTML = `
                <p style="color:#b6a269; margin-bottom:5px;">背番号 ${data[0]} | ${data[14]} (${data[15]}) | ${data[16]}</p>
                <h2 style="color:#fff; font-size:32px; margin:0 0 10px 0;">${data[1]}</h2>
                <p style="color:#ccc; font-size:14px; margin-bottom:15px;">生年月日：${data[17] || '---'}</p>
                <hr>
                <div style="text-align:left; color:#fff; font-size:15px; line-height:2.2; display:grid; grid-template-columns: 1fr 1fr; margin-top:15px;">
                    <div>試合/登板：${data[2]}</div>
                    <div>${isPitcher ? '勝利' : '打数'}：${data[3]}</div>
                    <div>${isPitcher ? '敗戦' : '安打'}：${data[4]}</div>
                    <div>${isPitcher ? 'ホールド' : '本塁打'}：${data[5]}</div>
                    <div>${isPitcher ? 'セーブ' : '打点'}：${data[6]}</div>
                    <div>${isPitcher ? 'アウト数' : '四死球'}：${data[7]}</div>
                    <div>${isPitcher ? '被安打' : '犠飛'}：${data[8]}</div>
                    <div>${isPitcher ? '奪三振' : '盗塁'}：${data[9]}</div>
                    <div>${isPitcher ? '与四球' : '塁打'}：${data[10]}</div>
                    <div>${isPitcher ? '自責点' : '-'}：${isPitcher ? data[11] : '---'}</div>
                    <div style="grid-column: span 2; border-top: 1px solid #333; margin-top: 5px; padding-top: 5px;">
                        <span style="color:#b6a269;">${isPitcher ? '防御率' : '打率'}:</span> ${data[12]} 
                        <span style="color:#b6a269; margin-left:20px;">${isPitcher ? 'WHIP' : 'OPS'}:</span> ${data[13]}
                    </div>
                </div>
            `;
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        loadStats();
    </script>
</body>
</html>
