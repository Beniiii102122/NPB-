<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オリックス名鑑</title>
    <style>
        body { background-color: #000033; font-family: sans-serif; color: #b6a269; margin: 0; }
        .player-container { display: flex; flex-wrap: wrap; gap: 15px; padding: 20px; justify-content: center; }
        .player-card { background-color: rgba(255, 255, 255, 0.1); border: 1px solid #b6a269; padding: 15px; width: 180px; border-radius: 8px; text-align: center; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        .label { font-size: 11px; color: #b6a269; }
        .stats { font-size: 18px; color: #fff; font-weight: bold; }
        .name { font-size: 20px; margin: 5px 0; font-weight: bold; }
        hr { border: 0; border-top: 1px solid #b6a269; }
    </style>
</head>
<body>
    <h1 style="text-align: center; margin-top: 20px;">ORIX BUFFALOES PLAYER STATS</h1>
    <div id="container" class="player-container">
        <p id="loading">データを読み込み中...</p>
    </div>

    <script>
        // ★ここだけ書き換える！
        const SPREADSHEET_ID = '1dAaf-rsBz87908KYebqehlK4yG2lU0V_AnXUwL-mRw';
        const TAB_NAME = 'シート1'; 
        
        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${TAB_NAME}`;

        async function loadStats() {
            try {
                const response = await fetch(url);
                const csvData = await response.text();
                const rows = csvData.split('\n').slice(1);
                const container = document.getElementById('container');
                container.innerHTML = '';
                rows.forEach(row => {
                    const cols = row.split(',').map(col => col.replace(/"/g, ''));
                    if (cols.length < 2) return;
                    const card = document.createElement('div');
                    card.className = 'player-card';
                    card.innerHTML = `
                        <p style="margin:0; font-size:12px;">背番号 ${cols[0]}</p>
                        <p class="name">${cols[1]}</p>
                        <hr>
                        <div class="stats-grid">
                            <div><span class="label">試合数</span><br><span class="stats">${cols[2]}</span></div>
                            <div><span class="label">打率</span><br><span class="stats">${cols[3]}</span></div>
                            <div><span class="label">本塁打</span><br><span class="stats">${cols[4]}</span></div>
                            <div><span class="label">打点</span><br><span class="stats">${cols[5]}</span></div>
                            <div><span class="label">安打</span><br><span class="stats">${cols[6]}</span></div>
                            <div><span class="label">OPS</span><br><span class="stats">${cols[7]}</span></div>
                        </div>`;
                    container.appendChild(card);
                });
            } catch (e) {
                document.getElementById('loading').innerText = '読み込み失敗。設定を確認してね！';
            }
        }
        loadStats();
    </script>
</body>
</html>
