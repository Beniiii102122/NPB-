<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オリックス名鑑 Pro + 投手対応</title>
    <style>
        body { background-color: #000033; font-family: sans-serif; color: #b6a269; margin: 0; padding-bottom: 50px; }
        h1 { text-align: center; margin-top: 30px; }
        
        .controls { text-align: center; margin: 20px 0; }
        .sort-btn {
            background-color: transparent; color: #b6a269; border: 1px solid #b6a269;
            padding: 8px 16px; margin: 5px; cursor: pointer; border-radius: 20px;
        }
        .sort-btn.active { background-color: #b6a269; color: #000; }

        .player-container { display: flex; flex-wrap: wrap; gap: 15px; padding: 20px; justify-content: center; }
        .player-card { 
            background-color: rgba(255, 255, 255, 0.05); border: 1px solid rgba(182, 162, 105, 0.3);
            padding: 15px; width: 180px; border-radius: 12px; text-align: center; cursor: pointer;
        }
        /* 投手カードに少し色を付ける演出 */
        .card-pitcher { border-left: 4px solid #fff; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        .label { font-size: 11px; color: #b6a269; }
        .stats { font-size: 18px; color: #fff; font-weight: bold; }
        .name { font-size: 20px; margin: 5px 0; font-weight: bold; color: #fff; }
        hr { border: 0; border-top: 1px solid rgba(182, 162, 105, 0.3); margin: 10px 0; }

        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9); justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content { background-color: #000044; border: 2px solid #b6a269; padding: 30px; border-radius: 20px; width: 85%; max-width: 400px; text-align: center; }
        .close-btn { margin-top: 25px; background-color: #b6a269; color: #000; border: none; padding: 10px 30px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>ORIX PLAYER STATS</h1>

    <div class="controls">
        <button class="sort-btn active" id="btn-num" onclick="sortData('number')">背番号順</button>
        <button class="sort-btn" id="btn-type" onclick="sortData('type')">位置別</button>
    </div>
    
    <div id="container" class="player-container">
        <p id="loading">データを読み込み中...</p>
    </div>

    <div id="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modal-detail"></div>
            <button class="close-btn" onclick="closeModal()">閉じる</button>
        </div>
    </div>

    <script>
        const SPREADSHEET_ID ='1dAaf-rsBz87908KYebqehlK4yG2lUrvCEZWDWVAnXUw';
        const TAB_NAME = 'シート1'; 
        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${TAB_NAME}`;

        let allPlayers = [];

        async function loadStats() {
            try {
                const response = await fetch(url);
                const csvData = await response.text();
                const rows = csvData.split(/\r?\n/).slice(1).filter(row => row.trim() !== "");
                
                allPlayers = rows.map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(col => col.replace(/"/g, '').trim()));
                renderCards(allPlayers);
            } catch (e) {
                document.getElementById('loading').innerText = '失敗。スプレッドシートの形式を確認してください。';
            }
        }

        function sortData(type) {
            let sorted = [...allPlayers];
            document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));

            if (type === 'number') {
                sorted.sort((a, b) => Number(a[0]) - Number(b[0]));
                document.getElementById('btn-num').classList.add('active');
            } else if (type === 'type') {
                // 投手か野手かで並び替え
                sorted.sort((a, b) => a[9].localeCompare(b[9]));
                document.getElementById('btn-type').classList.add('active');
            }
            renderCards(sorted);
        }

        function renderCards(data) {
            const container = document.getElementById('container');
            container.innerHTML = '';

            data.forEach(cols => {
                const isPitcher = (cols[9] === '投手'); // 10列目が「投手」ならtrue
                const card = document.createElement('div');
                card.className = `player-card ${isPitcher ? 'card-pitcher' : ''}`;
                card.onclick = () => showDetail(cols);
                
                // 表示ラベルを切り替え
                const label1 = isPitcher ? '防御率' : '打率';
                const label2 = isPitcher ? '勝利' : '本塁打';
                const val1 = cols[3]; // ここはスプレッドシートの並びに合わせる
                const val2 = cols[4];

                card.innerHTML = `
                    <p style="margin:0; font-size:11px;">${cols[9] || ''} NO.${cols[0]}</p>
                    <p class="name">${cols[1]}</p>
                    <hr>
                    <div class="stats-grid">
                        <div><span class="label">${label1}</span><br><span class="stats">${val1}</span></div>
                        <div><span class="label">${label2}</span><br><span class="stats">${val2}</span></div>
                    </div>`;
                container.appendChild(card);
            });
        }

        function showDetail(data) {
            const isPitcher = (data[9] === '投手');
            const modal = document.getElementById('modal');
            const detail = document.getElementById('modal-detail');
            
            // 投手用と野手用で詳細レイアウトを出し分ける
            let statsHtml = isPitcher ? `
                <p>登板数：${data[2]}</p>
                <p>防御率：${data[3]}</p>
                <p>勝利数：${data[4]}</p>
                <p>奪三振：${data[5]}</p>
                <p>セーブ：${data[6]}</p>
                <p>WHIP：${data[7]}</p>
            ` : `
                <p>試合数：${data[2]}</p>
                <p>打率　：${data[3]}</p>
                <p>本塁打：${data[4]}</p>
                <p>打点　：${data[5]}</p>
                <p>安打　：${data[6]}</p>
                <p>OPS 　：${data[7]}</p>
            `;

            detail.innerHTML = `
                <p style="color:#b6a269;">${data[9]} 背番号 ${data[0]}</p>
                <h2 style="color:#fff; font-size:32px;">${data[1]}</h2>
                <hr>
                <div style="text-align:left; color:#fff; font-size:18px; line-height:1.8; width:fit-content; margin: 0 auto;">
                    ${statsHtml}
                </div>
            `;
            modal.style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        loadStats();
    </script>
</body>
</html>
