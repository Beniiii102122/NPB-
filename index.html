<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPB 選手名鑑</title>
    <style>
        :root {
            --team-bg: #f4f4f4;
            --team-accent: #333333;
            --sidebar-width: 250px;
        }

        body { 
            background-color: var(--team-bg); 
            font-family: sans-serif;
            color: #333; 
            margin: 0; 
            padding-bottom: 50px; 
        }

        /* --- ヘッダー --- */
        .sticky-header {
            position: sticky; top: 0; z-index: 900;
            background: #fff; padding-bottom: 10px;
            border-bottom: 2px solid var(--team-accent);
        }

        .sidebar {
            height: 100%; width: 0; position: fixed; z-index: 1001; top: 0; left: 0;
            background-color: #333; overflow-x: hidden; transition: 0.3s; padding-top: 60px;
        }
        .sidebar a, .sidebar .menu-item {
            padding: 15px 25px; text-decoration: none; font-size: 16px; color: #fff; display: block; border-bottom: 1px solid #444; cursor: pointer;
        }
        .sidebar .closebtn { position: absolute; top: 10px; right: 20px; font-size: 30px; }

        .openbtn {
            font-size: 16px; cursor: pointer; background: #333; color: white;
            padding: 8px 12px; border: none; position: fixed; top: 10px; left: 10px;
            z-index: 1000; border-radius: 4px;
        }

        .header-container { text-align: center; padding: 50px 0 10px 0; }
        #team-name-display { font-size: 22px; font-weight: bold; }

        .filter-area { display: flex; flex-direction: column; align-items: center; gap: 8px; margin: 0 auto; width: 95%; max-width: 500px; }
        #player-search { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; box-sizing: border-box; }
        .select-container { display: flex; width: 100%; gap: 5px; }
        .filter-select { padding: 8px; border: 1px solid #ccc; background: #fff; flex: 1; border-radius: 4px; }

        /* --- 選手カード (縦長に調整) --- */
        .player-container { display: flex; flex-wrap: wrap; gap: 12px; padding: 20px 10px; justify-content: center; }
        .player-card { 
            background: #fff; border: 1px solid #ddd; 
            padding: 25px 5px 20px 5px; /* 上下のパディングを増やして縦長に */
            width: 155px; 
            min-height: 180px; /* 高さを確保 */
            text-align: center; cursor: pointer; position: relative; border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* 要素を上下に分散 */
        }
        
        .number-badge {
            position: absolute; top: 8px; left: 8px;
            background: var(--team-accent); color: #fff;
            font-size: 11px; font-weight: bold;
            min-width: 24px; height: 24px; line-height: 24px;
            border-radius: 12px; padding: 0 4px; box-sizing: border-box;
        }

        .pos-badge { display: inline-block; padding: 2px 8px; background: #eee; color: #666; font-size: 10px; margin-bottom: 5px; border-radius: 3px; }
        .name { font-size: 18px; margin: 10px 0; font-weight: bold; color: #000; line-height: 1.2; }
        
        .stats-grid { 
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2px; 
            margin-top: auto; /* 下部に固定 */
            background: #f9f9f9; padding: 8px 0; border-radius: 4px;
        }
        .label { font-size: 9px; color: #999; margin-bottom: 3px; }
        .stats { font-size: 14px; font-weight: bold; color: #333; }

        /* --- モーダル --- */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: #fff; padding: 20px; border-radius: 8px; width: 85%; max-width: 350px; }
        .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .modal-item { background: #f8f8f8; padding: 10px; border-radius: 4px; text-align: center; border: 1px solid #eee; }
        .close-btn { background: #333; color: #fff; border: none; padding: 12px 0; width: 100%; cursor: pointer; margin-top: 20px; font-weight: bold; border-radius: 4px; }
    </style>
</head>
<body>

    <button class="openbtn" onclick="openNav()">☰ メニュー</button>

    <div id="mySidebar" class="sidebar">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">×</a>
        <div class="menu-item" onclick="toggleDropdown('pa-league')">パ・リーグ ▼</div>
        <div id="pa-league" style="display:none; background:#222;"></div>
        <div class="menu-item" onclick="toggleDropdown('ce-league')">セ・リーグ ▼</div>
        <div id="ce-league" style="display:none; background:#222;"></div>
    </div>

    <div id="main">
        <div class="sticky-header">
            <div class="header-container">
                <div id="team-name-display">読み込み中...</div>
            </div>
            <div class="filter-area">
                <input type="text" id="player-search" placeholder="選手名を検索..." oninput="applyFilters()">
                <div class="select-container">
                    <select id="filter-pos" class="filter-select" onchange="applyFilters()">
                        <option value="">すべての守備位置</option>
                        <option value="先発">先発</option>
                        <option value="リリーフ">リリーフ</option>
                        <option value="捕手">捕手</option>
                        <option value="内野手">内野手</option>
                        <option value="外野手">外野手</option>
                    </select>
                </div>
            </div>
        </div>
        <div id="container" class="player-container"></div>
    </div>

    <div id="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modal-detail"></div>
            <button class="close-btn" onclick="closeModal()">閉じる</button>
        </div>
    </div>

    <script>
        const TEAMS = {
            ORIX: { id: '1dAaf-rsBz87908KYebqehlK4yG2lUrvCEZWDWVAnXUw', name: 'オリックス', title: 'オリックス・バファローズ', accent: '#b6a269', league: 'pa' },
            SOFTBANK: { id: '1D55MmUmSxxvDf92UE_N0N3BTSrZOoR5qQxoXm_BL2_E', name: 'ソフトバンク', title: '福岡ソフトバンクホークス', accent: '#ffcc00', league: 'pa' },
            FIGHTERS: { id: '14Nd-iWKpiJg7M0Ou2NG0bgARZHJY-JIdARiWCwVTmjM', name: '日本ハム', title: '北海道日本ハムファイズ', accent: '#005491', league: 'pa' },
            EAGLES: { id: '1o5tO7aFL2tA_eWfQCPuhyatXC4oqQUOYc1C49DuQ_sU', name: '楽天', title: '東北楽天ゴールデンイーグルス', accent: '#870011', league: 'pa' },
            LIONS: { id: '1rU0KqHiGXvS3hAMp0snepykftW4gnoEcqNAFcK9ZJw', name: '西武', title: '埼玉西武ライオンズ', accent: '#03192e', league: 'pa' },
            MARINES: { id: '1knxzRo7DNJO2FMXH09rhif4Shb06wEj80FF0whPoAuc', name: 'ロッテ', title: '千葉ロッテマリーンズ', accent: '#333', league: 'pa' },
            HANSHIN: { id: '1hZwkTDSa4AOUSlvFvgYB74hU78Uk6Tb3Wxdr6wKuPhs', name: '阪神', title: '阪神タイガース', accent: '#ffcc00', league: 'ce' },
            BAYSTARS: { id: '1EGfKQS7CPBxnqk7MN6MVoFc1naTvplPwMMlvO6ucXrs', name: 'DeNA', title: '横浜DeNAベイスターズ', accent: '#005596', league: 'ce' },
            GIANTS: { id: '11fiRAjQKNG2widh8Hs9X5izk76CsBhkxC5GucEu3Gio', name: '巨人', title: '読売ジャイアンツ', accent: '#ff6600', league: 'ce' },
            DRAGONS: { id: '1jgeiLHIvsXpg-Lb-NS9EwQtsciqqusxMYqUZNDVt5MA', name: '中日', title: '中日ドラゴンズ', accent: '#004a9e', league: 'ce' },
            CARP: { id: '1xp_n78P5IMw63fD9dtDF9tQhK9zgF5otK9fwLNPOW2s', name: '広島', title: '広島東洋カープ', accent: '#ff0000', league: 'ce' },
            SWALLOWS: { id: '1BYL-hAJNaSshpWfDYnYsk9GdUIT9nEEIGejLuFV4BxY', name: 'ヤクルト', title: '東京ヤクルトスワローズ', accent: '#97c24a', league: 'ce' }
        };

        let allPlayers = [];

        function init() {
            const pa = document.getElementById('pa-league');
            const ce = document.getElementById('ce-league');
            Object.keys(TEAMS).forEach(k => {
                const t = TEAMS[k];
                const d = document.createElement('div');
                d.style.padding = '12px 40px'; d.style.color = '#ccc'; d.style.cursor = 'pointer'; d.innerText = t.name;
                d.onclick = () => switchTeam(k);
                if(t.league === 'pa') pa.appendChild(d); else ce.appendChild(d);
            });
            switchTeam('ORIX');
        }

        async function switchTeam(key) {
            const t = TEAMS[key];
            closeNav();
            document.getElementById('team-name-display').innerText = t.title;
            document.documentElement.style.setProperty('--team-accent', t.accent);
            try {
                const res = await fetch(`https://docs.google.com/spreadsheets/d/${t.id}/gviz/tq?tqx=out:csv&sheet=シート1`);
                const text = await res.text();
                const rows = text.split(/\r?\n/).filter(r => r.trim() !== "").slice(1);
                allPlayers = rows.map(r => r.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g).map(c => c.replace(/^"|"$/g, '')));
                render(allPlayers);
            } catch (e) { console.error(e); }
        }

        function render(data) {
            const c = document.getElementById('container'); c.innerHTML = '';
            data.forEach(p => {
                const isP = p[14] === '投手';
                const pos = p[15];
                let l1, s1, l2, s2, l3, s3;

                if (isP) {
                    l1 = '防御率'; s1 = p[12];
                    if (pos.includes('先発')) {
                        l2 = '勝利'; s2 = p[3]; l3 = '敗戦'; s3 = p[4];
                    } else {
                        l2 = 'ホールド'; s2 = p[5]; l3 = 'セーブ'; s3 = p[6];
                    }
                } else {
                    l1 = '打率'; s1 = p[12]; l2 = '本塁打'; s2 = p[5]; l3 = '打点'; s3 = p[6];
                }

                const card = document.createElement('div');
                card.className = 'player-card';
                card.onclick = () => showDetail(p);
                card.innerHTML = `
                    <div class="number-badge">${p[0]}</div>
                    <div>
                        <div class="pos-badge">${pos}</div>
                        <div class="name">${p[1]}</div>
                    </div>
                    <div class="stats-grid">
                        <div><div class="label">${l1}</div><div class="stats">${s1}</div></div>
                        <div><div class="label">${l2}</div><div class="stats">${s2}</div></div>
                        <div><div class="label">${l3}</div><div class="stats">${s3}</div></div>
                    </div>`;
                c.appendChild(card);
            });
        }

        function showDetail(d) {
            const isP = d[14] === '投手';
            let items = [];
            
            if (isP) {
                items = [
                    {l:'登板数', v:d[2]}, {l:'防御率', v:d[12]}, {l:'勝利', v:d[3]}, 
                    {l:'敗戦', v:d[4]}, {l:'ホールド', v:d[5]}, {l:'セーブ', v:d[6]}, {l:'WHIP', v:d[13]}
                ];
            } else {
                items = [
                    {l:'試合数', v:d[2]}, {l:'打率', v:d[12]}, {l:'本塁打', v:d[5]}, 
                    {l:'打点', v:d[6]}, {l:'盗塁', v:d[9]}, {l:'OPS', v:d[13]}
                ];
            }

            const statsHTML = items.map(i => `
                <div class="modal-item">
                    <div class="label" style="font-size:10px;">${i.l}</div>
                    <div class="stats" style="font-size:18px;">${i.v}</div>
                </div>`).join('');

            document.getElementById('modal-detail').innerHTML = `
                <div style="font-size:12px;color:#888;margin-bottom:2px;">背番号 ${d[0]} | ${d[15]}</div>
                <div style="font-size:24px;font-weight:bold;margin-bottom:15px;border-bottom:2px solid var(--team-accent);padding-bottom:5px;">${d[1]}</div>
                <div class="modal-grid">${statsHTML}</div>
            `;
            document.getElementById('modal').style.display = 'flex';
        }

        function applyFilters() {
            const q = document.getElementById('player-search').value.toLowerCase();
            const pos = document.getElementById('filter-pos').value;
            const filtered = allPlayers.filter(p => {
                const matchPos = pos === "" || (pos === "リリーフ" ? (p[15].includes("中継") || p[15].includes("抑")) : p[15].includes(pos));
                return p[1].includes(q) && matchPos;
            });
            render(filtered);
        }

        function openNav() { document.getElementById("mySidebar").style.width = "var(--sidebar-width)"; }
        function closeNav() { document.getElementById("mySidebar").style.width = "0"; }
        function toggleDropdown(id) { 
            const d = document.getElementById(id); 
            d.style.display = d.style.display === "block" ? "none" : "block"; 
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        init();
    </script>
</body>
</html>
