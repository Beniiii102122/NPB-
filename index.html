<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPB 選手名鑑 Pro</title>
    <style>
        :root {
            --team-bg: #1a1a1a;
            --team-accent: #f5c700;
            --team-modal: #222222;
            --sidebar-width: 250px;
        }

        body { 
            background-color: var(--team-bg); 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            color: var(--team-accent); 
            margin: 0; 
            padding-bottom: 50px; 
            transition: background-color 0.5s;
        }

        /* --- 固定ヘッダー --- */
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 900;
            background-color: var(--team-bg);
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* --- サイドバー --- */
        .sidebar {
            height: 100%; width: 0; position: fixed; z-index: 1001; top: 0; left: 0;
            background-color: #111; overflow-x: hidden; transition: 0.3s;
            padding-top: 60px; border-right: 1px solid var(--team-accent);
        }
        .sidebar a, .sidebar .menu-item {
            padding: 15px 25px; text-decoration: none; font-size: 18px; color: #fff;
            display: block; transition: 0.3s; cursor: pointer; border-bottom: 1px solid #222;
        }
        .sidebar a:hover, .sidebar .menu-item:hover { color: var(--team-accent); }
        .sidebar .closebtn { position: absolute; top: 0; right: 25px; font-size: 36px; color: var(--team-accent); }
        .dropdown-container { display: none; background-color: #222; padding-left: 8px; }
        .dropdown-container div { padding: 12px 12px 12px 40px; font-size: 14px; color: #ccc; cursor: pointer; }

        .openbtn {
            font-size: 20px; cursor: pointer; background-color: #111; color: white;
            padding: 10px 15px; border: none; position: fixed; top: 15px; left: 15px;
            z-index: 1000; border-radius: 5px; border: 1px solid var(--team-accent);
        }

        /* --- メインコンテンツ --- */
        .header-container { text-align: center; padding: 60px 0 10px 0; }
        .main-title { font-size: 22px; margin: 0; letter-spacing: 2px; color: #fff; font-weight: 900; }
        .sub-title { font-size: 12px; margin: 5px 0 0 0; color: var(--team-accent); opacity: 0.8; }
        #team-name-display { font-size: 18px; margin: 10px 0; font-weight: bold; }

        .filter-area { display: flex; flex-direction: column; align-items: center; gap: 8px; margin: 0 auto; width: 95%; max-width: 500px; }
        .search-container { display: flex; width: 100%; gap: 8px; }
        #player-search { flex: 1; padding: 12px 15px; border-radius: 25px; border: 1px solid var(--team-accent); background: rgba(255,255,255,0.1); color: #fff; outline: none; }

        .select-container { display: flex; width: 100%; gap: 5px; }
        .filter-select { flex: 1; padding: 10px 2px; border-radius: 10px; border: 1px solid var(--team-accent); background: #222; color: #fff; font-size: 11px; cursor: pointer; }
        
        .fav-filter-btn { 
            padding: 10px; border-radius: 10px; border: 1px solid var(--team-accent); 
            background: #222; color: #fff; font-size: 12px; cursor: pointer; min-width: 45px;
        }
        .fav-filter-btn.active { background: var(--team-accent); color: #000; }

        /* --- 選手カード --- */
        .player-container { display: flex; flex-wrap: wrap; gap: 12px; padding: 20px 15px; justify-content: center; min-height: 300px; }
        .player-card { 
            background-color: rgba(255, 255, 255, 0.05); border: 1px solid var(--team-accent); 
            padding: 15px; width: 145px; border-radius: 15px; text-align: center; cursor: pointer; position: relative;
        }
        .fav-btn { position: absolute; top: 8px; right: 8px; font-size: 20px; color: #555; transition: 0.2s; }
        .fav-btn.active { color: #ffcc00; }
        
        .pos-badge { 
            display: inline-block; padding: 2px 8px; border-radius: 10px; background: var(--team-accent); 
            color: #000; font-size: 9px; font-weight: bold; margin-bottom: 5px; 
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        .label { font-size: 10px; color: var(--team-accent); font-weight: bold; }
        .stats { font-size: 18px; color: #fff; font-weight: bold; }
        .name { font-size: 15px; margin: 5px 0; font-weight: bold; color: #fff; height: 2.4em; display: flex; align-items: center; justify-content: center; }

        /* --- ローディング --- */
        #loader { display: none; text-align: center; padding: 50px; }
        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--team-accent); border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- モーダル --- */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.9); justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(8px); }
        .modal-content { background-color: var(--team-modal); border: 2px solid var(--team-accent); padding: 30px 20px; border-radius: 24px; width: 85%; max-width: 380px; text-align: center; color: #fff; }
        .close-btn { background-color: var(--team-accent); color: #000; border: none; padding: 10px 40px; border-radius: 25px; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <button class="openbtn" onclick="openNav()">☰</button>

    <div id="mySidebar" class="sidebar">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">×</a>
        <a onclick="location.reload()">NPB 選手名鑑</a>
        <div class="menu-item" onclick="toggleDropdown('pa-league')">パ・リーグ ▼</div>
        <div id="pa-league" class="dropdown-container">
            <div onclick="switchTeam('SOFTBANK')">ソフトバンク</div>
            <div onclick="switchTeam('FIGHTERS')">日本ハム</div>
            <div onclick="switchTeam('ORIX')">オリックス</div>
            <div onclick="switchTeam('EAGLES')">楽天</div>
            <div onclick="switchTeam('LIONS')">西武</div>
            <div onclick="switchTeam('MARINES')">ロッテ</div>
        </div>
        <div class="menu-item" onclick="toggleDropdown('ce-league')">セ・リーグ ▼</div>
        <div id="ce-league" class="dropdown-container">
            <div onclick="switchTeam('HANSHIN')">阪神</div>
            <div onclick="switchTeam('BAYSTARS')">DeNA</div>
            <div onclick="switchTeam('GIANTS')">巨人</div>
            <div onclick="switchTeam('DRAGONS')">中日</div>
            <div onclick="switchTeam('CARP')">広島</div>
            <div onclick="switchTeam('SWALLOWS')">ヤクルト</div>
        </div>
        <a href="https://forms.gle/PZdrWHx4sJ3gfjh19" target="_blank">お問い合わせ</a>
    </div>

    <div id="main">
        <div class="sticky-header">
            <div class="header-container">
                <div class="main-title">NPB 選手名鑑 Pro</div>
                <div class="sub-title">リーグ</div>
                <div id="team-name-display">チームを選択してください</div>
            </div>

            <div class="filter-area">
                <div class="search-container">
                    <input type="text" id="player-search" placeholder="名前で検索..." oninput="applyFilters()">
                </div>
                <div class="select-container">
                    <button id="fav-toggle" class="fav-filter-btn" onclick="toggleFavFilter()">★</button>
                    <select id="filter-pos" class="filter-select" onchange="applyFilters()">
                        <option value="">全選手</option>
                        <option value="先発">先発</option>
                        <option value="リリーフ">リリーフ</option>
                        <option value="捕手">捕手</option>
                        <option value="内野手">内野手</option>
                        <option value="外野手">外野手</option>
                    </select>
                    <select id="filter-squad" class="filter-select" onchange="applyFilters()">
                        <option value="">全選手</option>
                        <option value="一軍">一軍</option>
                        <option value="二軍">二軍</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="loader">
            <div class="spinner"></div>
            <p>データを読み込み中...</p>
        </div>
        
        <div id="container" class="player-container"></div>
    </div>

    <div id="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modal-detail"></div>
            <button class="close-btn" onclick="closeModal()">閉じる</button>
        </div>
    </div>

    <script>
        const TEAMS = {
            SOFTBANK: { id: '1D55MmUmSxxvDf92UE_N0N3BTSrZOoR5qQxoXm_BL2_E', title: '福岡ソフトバンクホークス', bg: '#1a1a1a', accent: '#f5c700', modal: '#222222', league: 'パ・リーグ' },
            FIGHTERS: { id: '14Nd-iWKpiJg7M0Ou2NG0bgARZHJY-JIdARiWCwVTmjM', title: '北海道日本ハムファイターズ', bg: '#005491', accent: '#f3c759', modal: '#003e6b', league: 'パ・リーグ' },
            ORIX: { id: '1dAaf-rsBz87908KYebqehlK4yG2lUrvCEZWDWVAnXUw', title: 'オリックス・バファローズ', bg: '#000033', accent: '#b6a269', modal: '#000044', league: 'パ・リーグ' },
            EAGLES: { id: '1o5tO7aFL2tA_eWfQCPuhyatXC4oqQUOYc1C49DuQ_sU', title: '東北楽天ゴールデンイーグルス', bg: '#870011', accent: '#EAAA00', modal: '#4c000a', league: 'パ・リーグ' },
            LIONS: { id: '1rU0KqHiGXvS3hAMp0snepykftW4gnoEcqNAFcK9ZJw', title: '埼玉西武ライオンズ', bg: '#03192e', accent: '#ffffff', modal: '#0a2a47', league: 'パ・リーグ' },
            MARINES: { id: '1knxzRo7DNJO2FMXH09rhif4Shb06wEj80FF0whPoAuc', title: '千葉ロッテマリーンズ', bg: '#222222', accent: '#ffffff', modal: '#333333', league: 'パ・リーグ' },
            HANSHIN: { id: '1hZwkTDSa4AOUSlvFvgYB74hU78Uk6Tb3Wxdr6wKuPhs', title: '阪神タイガース', bg: '#000', accent: '#ffe200', modal: '#333', league: 'セ・リーグ' },
            BAYSTARS: { id: '1EGfKQS7CPBxnqk7MN6MVoFc1naTvplPwMMlvO6ucXrs', title: '横浜DeNAベイスターズ', bg: '#005596', accent: '#ffffff', modal: '#003e6b', league: 'セ・リーグ' },
            GIANTS: { id: '11fiRAjQKNG2widh8Hs9X5izk76CsBhkxC5GucEu3Gio', title: '読売ジャイアンツ', bg: '#ff6600', accent: '#ffffff', modal: '#333', league: 'セ・リーグ' },
            DRAGONS: { id: '1jgeiLHIvsXpg-Lb-NS9EwQtsciqqusxMYqUZNDVt5MA', title: '中日ドラゴンズ', bg: '#004a9e', accent: '#ffffff', modal: '#002d61', league: 'セ・リーグ' },
            CARP: { id: '1xp_n78P5IMw63fD9dtDF9tQhK9zgF5otK9fwLNPOW2s', title: '広島東洋カープ', bg: '#ff0000', accent: '#ffffff', modal: '#800000', league: 'セ・リーグ' },
            SWALLOWS: { id: '1BYL-hAJNaSshpWfDYnYsk9GdUIT9nEEIGejLuFV4BxY', title: '東京ヤクルトスワローズ', bg: '#002d56', accent: '#97c24a', modal: '#001a33', league: 'セ・リーグ' }
        };

        let allPlayers = [];
        let favorites = JSON.parse(localStorage.getItem('npb_favs')) || [];
        let showOnlyFavs = false;

        function openNav() { document.getElementById("mySidebar").style.width = "var(--sidebar-width)"; }
        function closeNav() { document.getElementById("mySidebar").style.width = "0"; }
        function toggleDropdown(id) {
            const dropdown = document.getElementById(id);
            dropdown.style.display = dropdown.style.display === "block" ? "none" : "block";
        }

        async function switchTeam(teamKey) {
            const config = TEAMS[teamKey];
            closeNav();
            document.querySelector('.sub-title').innerText = config.league;
            document.getElementById('team-name-display').innerText = config.title;
            document.documentElement.style.setProperty('--team-bg', config.bg);
            document.documentElement.style.setProperty('--team-accent', config.accent);
            document.documentElement.style.setProperty('--team-modal', config.modal);
            document.getElementById('player-search').value = "";
            document.getElementById('filter-pos').value = "";
            document.getElementById('filter-squad').value = "";
            await loadStats(config.id);
        }

        async function loadStats(sheetId) {
            const container = document.getElementById('container');
            const loader = document.getElementById('loader');
            container.innerHTML = '';
            loader.style.display = 'block';
            const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=シート1`;
            try {
                const response = await fetch(url);
                const csvData = await response.text();
                const rows = csvData.split(/\r?\n/).filter(row => row.trim() !== "").slice(1);
                allPlayers = rows.map(row => {
                    return row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g).map(c => c.replace(/^"|"$/g, ''));
                });
                loader.style.display = 'none';
                renderCards(allPlayers);
            } catch (e) { 
                loader.style.display = 'none';
                container.innerHTML = 'データの取得に失敗しました。'; 
            }
        }

        function toggleFavorite(e, playerName) {
            e.stopPropagation();
            if (favorites.includes(playerName)) {
                favorites = favorites.filter(n => n !== playerName);
            } else {
                favorites.push(playerName);
            }
            localStorage.setItem('npb_favs', JSON.stringify(favorites));
            applyFilters();
        }

        function toggleFavFilter() {
            showOnlyFavs = !showOnlyFavs;
            document.getElementById('fav-toggle').classList.toggle('active', showOnlyFavs);
            applyFilters();
        }

        function applyFilters() {
            if (allPlayers.length === 0) return;
            const nameQuery = document.getElementById('player-search').value.toLowerCase();
            const posFilter = document.getElementById('filter-pos').value;
            const squadFilter = document.getElementById('filter-squad').value;

            const filtered = allPlayers.filter(p => {
                const isFav = favorites.includes(p[1]);
                const matchName = p[1].includes(nameQuery);
                const matchSquad = squadFilter === "" || p[16] === squadFilter;
                const matchFav = !showOnlyFavs || isFav;
                
                let matchPos = false;
                const posStr = p[15];
                if (posFilter === "") {
                    matchPos = true;
                } else if (posFilter === "先発") {
                    matchPos = posStr.includes("先発");
                } else if (posFilter === "リリーフ") {
                    matchPos = posStr.includes("中継") || posStr.includes("抑") || posStr.includes("リリーフ");
                } else {
                    matchPos = posStr === posFilter;
                }
                
                return matchName && matchPos && matchSquad && matchFav;
            });
            renderCards(filtered);
        }

        function renderCards(dataList) {
            const container = document.getElementById('container');
            container.innerHTML = '';
            if(dataList.length === 0) {
                container.innerHTML = '<p style="color:#888; padding:50px;">該当する選手はいません</p>';
                return;
            }
            dataList.forEach(cols => {
                const isP = (cols[14] === '投手');
                const isFav = favorites.includes(cols[1]);
                const card = document.createElement('div');
                card.className = 'player-card';
                card.onclick = () => showDetail(cols);
                card.innerHTML = `
                    <div class="fav-btn ${isFav ? 'active' : ''}" onclick="toggleFavorite(event, '${cols[1]}')">★</div>
                    <div class="pos-badge">${cols[15]}</div>
                    <div style="font-size:10px; opacity:0.6;">No. ${cols[0]}</div>
                    <div class="name">${cols[1]}</div>
                    <div class="stats-grid">
                        <div><span class="label">${isP ? '登板' : '試合'}</span><br><span class="stats">${cols[2]}</span></div>
                        <div><span class="label">${isP ? '防御率' : '打率'}</span><br><span class="stats">${cols[12]}</span></div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function showDetail(data) {
            const isP = (data[14] === '投手');
            let stats = isP ? [
                {l: '登板', v: data[2]}, {l: '防御率', v: data[12]},
                {l: '勝利', v: data[3]}, {l: '敗戦', v: data[4]},
                {l: 'ホールド', v: data[5]}, {l: 'セーブ', v: data[6]},
                {l: '奪三振', v: data[9]}, {l: 'WHIP', v: data[13]}
            ] : [
                {l: '試合数', v: data[2]}, {l: '打率', v: `${data[12]}(${data[3]}-${data[4]})`},
                {l: '本塁打', v: data[5]}, {l: '打点', v: data[6]},
                {l: '盗塁', v: data[9]}, {l: 'OPS', v: data[13]}
            ];

            document.getElementById('modal-detail').innerHTML = `
                <div style="border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:15px; margin-bottom:20px;">
                    <div style="font-size:14px; color:var(--team-accent)">No. ${data[0]} | ${data[15]}</div>
                    <div style="font-size:28px; font-weight:bold;">${data[1]}</div>
                    <div style="font-size:13px; opacity:0.7; margin-top:5px;">${data[16]} | ${data[17]} 生まれ</div>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    ${stats.map(s => `<div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:10px;">
                        <div style="font-size:10px; color:var(--team-accent); font-weight:bold;">${s.l}</div>
                        <div style="font-size:18px; font-weight:bold;">${s.v}</div>
                    </div>`).join('')}
                </div>
            `;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        switchTeam('SOFTBANK');
    </script>
</body>
</html>
