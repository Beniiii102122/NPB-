<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPB 選手名鑑 Pro</title>
    <style>
        :root {
            --team-bg: #1a1a1a;
            --team-accent: #f5c700;
            --team-modal: #222222;
            --sidebar-width: 250px;
        }

        body { 
            background-color: var(--team-bg); 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            color: var(--team-accent); 
            margin: 0; 
            padding-bottom: 50px; 
            transition: background-color 0.5s;
        }

        /* --- サイドバー --- */
        .sidebar {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 1001;
            top: 0;
            left: 0;
            background-color: #111;
            overflow-x: hidden;
            transition: 0.3s;
            padding-top: 60px;
            border-right: 1px solid var(--team-accent);
        }

        .sidebar a, .sidebar .menu-item {
            padding: 15px 25px;
            text-decoration: none;
            font-size: 18px;
            color: #fff;
            display: block;
            transition: 0.3s;
            cursor: pointer;
            border-bottom: 1px solid #222;
        }

        .sidebar a:hover, .sidebar .menu-item:hover { color: var(--team-accent); }
        .sidebar .closebtn { position: absolute; top: 0; right: 25px; font-size: 36px; color: var(--team-accent); }

        .dropdown-container {
            display: none;
            background-color: #222;
            padding-left: 8px;
        }

        .dropdown-container div {
            padding: 12px 12px 12px 40px;
            font-size: 14px;
            color: #ccc;
            cursor: pointer;
            transition: 0.2s;
        }

        .dropdown-container div:hover { color: var(--team-accent); background: #333; }

        .openbtn {
            font-size: 20px;
            cursor: pointer;
            background-color: #111;
            color: white;
            padding: 10px 15px;
            border: none;
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 1000;
            border-radius: 5px;
            border: 1px solid var(--team-accent);
        }

        /* --- メイン --- */
        .header-container { text-align: center; padding: 60px 0 10px 0; }
        .main-title { font-size: 24px; margin: 0; letter-spacing: 2px; color: #fff; font-weight: 900; }
        .sub-title { font-size: 14px; margin: 5px 0 0 0; letter-spacing: 2px; color: var(--team-accent); opacity: 0.9; }
        #team-name-display { font-size: 18px; margin: 15px 0 5px 0; font-weight: bold; }

        .search-container { display: flex; justify-content: center; margin: 10px auto; width: 95%; max-width: 500px; gap: 8px; }
        #player-search { flex: 1; padding: 10px 15px; border-radius: 20px; border: 1px solid var(--team-accent); background: rgba(255,255,255,0.1); color: #fff; outline: none; }

        .player-container { display: flex; flex-wrap: wrap; gap: 12px; padding: 15px; justify-content: center; }
        .player-card { background-color: rgba(255, 255, 255, 0.05); border: 1px solid var(--team-accent); padding: 15px; width: 145px; border-radius: 12px; text-align: center; cursor: pointer; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        .label { font-size: 10px; color: var(--team-accent); font-weight: bold; }
        .stats { font-size: 18px; color: #fff; font-weight: bold; }
        .name { font-size: 15px; margin: 5px 0; font-weight: bold; color: #fff; height: 2.5em; display: flex; align-items: center; justify-content: center; }

        /* --- モーダル --- */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.9); justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(8px); }
        .modal-content { background-color: var(--team-modal); border: 2px solid var(--team-accent); padding: 30px 20px; border-radius: 24px; width: 85%; max-width: 380px; text-align: center; color: #fff; }
        .modal-header { border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; margin-bottom: 20px; }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .detail-item { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 12px; }
        .detail-label { font-size: 10px; color: var(--team-accent); font-weight: bold; margin-bottom: 4px; }
        .detail-value { font-size: 18px; font-weight: bold; }
        .close-btn { background-color: var(--team-accent); color: #000; border: none; padding: 10px 40px; border-radius: 25px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <button class="openbtn" onclick="openNav()">☰</button>

    <div id="mySidebar" class="sidebar">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">×</a>
        <a onclick="location.reload()">NPB 選手名鑑</a>
        
        <div class="menu-item" onclick="toggleDropdown('pa-league')">パ・リーグ ▼</div>
        <div id="pa-league" class="dropdown-container">
            <div onclick="switchTeam('SOFTBANK')">ソフトバンク</div>
            <div onclick="switchTeam('FIGHTERS')">日本ハム</div>
            <div onclick="switchTeam('ORIX')">オリックス</div>
            <div onclick="switchTeam('EAGLES')">楽天</div>
            <div onclick="switchTeam('LIONS')">西武</div>
            <div onclick="switchTeam('MARINES')">ロッテ</div>
        </div>

        <div class="menu-item" onclick="toggleDropdown('ce-league')">セ・リーグ ▼</div>
        <div id="ce-league" class="dropdown-container">
            <div onclick="switchTeam('GIANTS')">巨人</div>
            <div onclick="switchTeam('HANSHIN')">阪神</div>
            <div onclick="switchTeam('BAYSTARS')">DeNA</div>
            <div onclick="switchTeam('CARP')">広島</div>
            <div onclick="switchTeam('SWALLOWS')">ヤクルト</div>
            <div onclick="switchTeam('DRAGONS')">中日</div>
        </div>

        <a href="ここにGoogleフォームのURL" target="_blank">お問い合わせ</a>
    </div>

    <div id="main">
        <div class="header-container">
            <div class="main-title">NPB 選手名鑑</div>
            <div class="sub-title">パ・リーグ</div>
            <div id="team-name-display">福岡ソフトバンクホークス</div>
        </div>

        <div class="search-container">
            <input type="text" id="player-search" placeholder="選手名検索..." oninput="handleSearch()">
        </div>
        
        <div id="container" class="player-container">
            <p>読み込み中...</p>
        </div>
    </div>

    <div id="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modal-detail"></div>
            <button class="close-btn" onclick="closeModal()">閉じる</button>
        </div>
    </div>

    <script>
        const TEAMS = {
            SOFTBANK: { id: '1D55MmUmSxxvDf92UE_N0N3BTSrZOoR5qQxoXm_BL2_E', title: '福岡ソフトバンクホークス', bg: '#1a1a1a', accent: '#f5c700', modal: '#222222', league: 'パ・リーグ' },
            FIGHTERS: { id: '14Nd-iWKpiJg7M0Ou2NG0bgARZHJY-JIdARiWCwVTmjM', title: '北海道日本ハムファイターズ', bg: '#005491', accent: '#f3c759', modal: '#003e6b', league: 'パ・リーグ' },
            ORIX: { id: '1dAaf-rsBz87908KYebqehlK4yG2lUrvCEZWDWVAnXUw', title: 'オリックス・バファローズ', bg: '#000033', accent: '#b6a269', modal: '#000044', league: 'パ・リーグ' },
            EAGLES: { id: '1o5tO7aFL2tA_eWfQCPuhyatXC4oqQUOYc1C49DuQ_sU', title: '東北楽天ゴールデンイーグルス', bg: '#870011', accent: '#EAAA00', modal: '#4c000a', league: 'パ・リーグ' },
            LIONS: { id: '1rU0KqHiGXvS3hAMp0snqepykftW4gnoEcqNAFcK9ZJw', title: '埼玉西武ライオンズ', bg: '#03192e', accent: '#ffffff', modal: '#0a2a47', league: 'パ・リーグ' },
            MARINES: { id: '1knxzRo7DNJO2FMXH09rhif4Shb06wEj80FF0whPoAuc', title: '千葉ロッテマリーンズ', bg: '#222222', accent: '#ffffff', modal: '#333333', league: 'パ・リーグ' },
            GIANTS: { id: 'ここに巨人のID', title: '読売ジャイアンツ', bg: '#ff6600', accent: '#ffffff', modal: '#333', league: 'セ・リーグ' },
            HANSHIN: { id: 'ここに阪神のID', title: '阪神タイガース', bg: '#000', accent: '#ffe200', modal: '#333', league: 'セ・リーグ' },
            BAYSTARS: { id: 'ここにDeNAのID', title: '横浜DeNAベイスターズ', bg: '#005596', accent: '#ffffff', modal: '#003e6b', league: 'セ・リーグ' },
            CARP: { id: 'ここに広島のID', title: '広島東洋カープ', bg: '#ff0000', accent: '#ffffff', modal: '#800000', league: 'セ・リーグ' },
            SWALLOWS: { id: 'ここにヤクルトのID', title: '東京ヤクルトスワローズ', bg: '#002d56', accent: '#97c24a', modal: '#001a33', league: 'セ・リーグ' },
            DRAGONS: { id: 'ここに中日のID', title: '中日ドラゴンズ', bg: '#004a9e', accent: '#ffffff', modal: '#002d61', league: 'セ・リーグ' }
        };

        let allPlayers = []; 

        function openNav() { document.getElementById("mySidebar").style.width = "var(--sidebar-width)"; }
        function closeNav() { document.getElementById("mySidebar").style.width = "0"; }

        function toggleDropdown(id) {
            const dropdown = document.getElementById(id);
            dropdown.style.display = dropdown.style.display === "block" ? "none" : "block";
        }

        async function switchTeam(teamKey) {
            const config = TEAMS[teamKey];
            if(!config.id || config.id.includes('ここに')) {
                alert('この球団のIDは未設定です。');
                return;
            }
            closeNav();
            document.querySelector('.sub-title').innerText = config.league;
            document.getElementById('team-name-display').innerText = config.title;
            document.documentElement.style.setProperty('--team-bg', config.bg);
            document.documentElement.style.setProperty('--team-accent', config.accent);
            document.documentElement.style.setProperty('--team-modal', config.modal);
            await loadStats(config.id);
        }

        async function loadStats(sheetId) {
            const container = document.getElementById('container');
            container.innerHTML = '<p>読み込み中...</p>';
            const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=シート1`;
            try {
                const response = await fetch(url);
                const csvData = await response.text();
                const rows = csvData.split(/\r?\n/).filter(row => row.trim() !== "").slice(1);
                allPlayers = rows.map(row => {
                    return row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g).map(c => c.replace(/^"|"$/g, ''));
                });
                renderCards(allPlayers);
            } catch (e) { container.innerHTML = 'データの取得に失敗しました。'; }
        }

        function handleSearch() {
            const query = document.getElementById('player-search').value.toLowerCase();
            const filtered = allPlayers.filter(p => p[1].includes(query));
            renderCards(filtered);
        }

        // --- カード一覧の描画（投手/野手で項目切り替え） ---
        function renderCards(dataList) {
            const container = document.getElementById('container');
            container.innerHTML = '';
            dataList.forEach(cols => {
                const isP = (cols[14] === '投手');
                const card = document.createElement('div');
                card.className = 'player-card';
                card.onclick = () => showDetail(cols);
                
                // 動的にラベルと値を設定
                const label1 = isP ? '登板' : '試合';
                const value1 = cols[2];
                const label2 = isP ? '防御率' : '打率';
                const value2 = cols[12];

                card.innerHTML = `
                    <div style="font-size:11px; color:var(--team-accent)">No. ${cols[0]}</div>
                    <div class="name">${cols[1]}</div>
                    <div class="stats-grid">
                        <div><span class="label">${label1}</span><br><span class="stats">${value1}</span></div>
                        <div><span class="label">${label2}</span><br><span class="stats">${value2}</span></div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // --- 詳細画面の表示（投手/野手で項目切り替え） ---
        function showDetail(data) {
            const isP = (data[14] === '投手');
            
            // D列(data[3]) = 打数 / E列(data[4]) = 安打数
            const dasu = data[3] || "0";
            const anda = data[4] || "0";
            const batDisplay = `${data[12]}(${dasu}-${anda})`;
            
            const stats = isP ? [
                {l: '登板', v: data[2]}, {l: '防御率', v: data[12]},
                {l: '勝利', v: data[3]}, {l: '敗戦', v: data[4]},
                {l: 'セーブ', v: data[6]}, {l: '奪三振', v: data[9]}
            ] : [
                {l: '試合数', v: data[2]}, {l: '打率', v: batDisplay},
                {l: '本塁打', v: data[5]}, {l: '打点', v: data[6]},
                {l: '盗塁', v: data[9]}, {l: 'OPS', v: data[13]}
            ];

            document.getElementById('modal-detail').innerHTML = `
                <div class="modal-header">
                    <div style="font-size:14px; color:var(--team-accent)">No. ${data[0]}</div>
                    <div style="font-size:28px; font-weight:bold;">${data[1]}</div>
                    <div style="font-size:13px; opacity:0.7;">${data[15]} | ${data[16]}</div>
                </div>
                <div class="detail-grid">
                    ${stats.map(s => `
                        <div class="detail-item">
                            <div class="detail-label">${s.l}</div>
                            <div class="detail-value">${s.v}</div>
                        </div>
                    `).join('')}
                </div>
                <div style="font-size:12px; color:#aaa; margin-top:10px;">${data[17]} 生まれ</div>
            `;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        switchTeam('SOFTBANK');
    </script>
</body>
</html>
